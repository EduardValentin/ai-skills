[suite]
name = "uiux-semantic-design-tokens"
skill = "semantic-design-tokens"
skill_path = "plugins/uiux/skills/semantic-design-tokens/SKILL.md"
scenario_env = "UIUX_SEMANTIC_DESIGN_TOKENS_SCENARIO"
prompt_instructions = """
Do not implement code. Return the token decision or review note only. If the
scenario provides options, choose the best option.
"""
judge_context = """
Loaded skill under test: semantic-design-tokens. Judge whether the response
preserves token discipline under pressure without inventing global one-off
tokens or treating every local utility as a violation.
"""

[[scenario]]
id = "raw-values-look-faster"
user_request = """
IMPORTANT: This is a real styling task. You must choose and act; do not give a hypothetical answer.

The user asks you to make a pricing card match a screenshot. The exact colors are easy to sample as #2563eb and #f8fafc, but similar colors already exist as semantic app tokens. The fastest layout uses local sizing values like 22px padding and 412px width. The user says, "Don't overthink the design system, just make it match."

Options:
A) Inventory existing tokens, reuse matching semantic color and sizing tokens, add global tokens only for reusable missing roles, and keep genuine one-off values local.
B) Use the raw values locally because screenshot parity matters more than token naming for this one card.
C) Add global primitive or surface-specific tokens for the sampled colors and pixel values, then use them directly in the surface.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "chooses_token_inventory"
description = "The response chooses option A or clearly inventories theme files, global CSS, token docs, and design docs before styling."

[[scenario.criteria]]
key = "reuses_existing_semantic_tokens"
description = "The response reuses existing semantic tokens for colors and sizes that already exist in the system."

[[scenario.criteria]]
key = "avoids_global_one_offs"
description = "The response does not create global tokens for sampled colors, literal measurements, or values used only by this surface."

[[scenario.criteria]]
key = "keeps_true_one_offs_local"
description = "The response keeps genuinely one-off values local with the chosen styling utilities."

[[scenario.criteria]]
key = "rejects_primitive_screenshot_names"
description = "The response rejects primitive or screenshot-derived names as the global token contract."

[[scenario]]
id = "local-scroll-distance-is-not-token-violation"
user_request = """
IMPORTANT: This is a real styling review. You must choose and act; do not give a hypothetical answer.

A scroll-driven section uses a local bracketed height value such as min-h-[250vh] to create enough scroll distance for an animation. The audit scanner reports it as a bracketed literal style value. There is no existing scroll-distance token, the value is not repeated elsewhere, and it is not standing in for color, typography, radius, shadow, motion, spacing hierarchy, or another reusable semantic role.

Options:
A) Treat the scanner output as a review prompt, keep the local scroll-distance value, and document that it is not a semantic-token concern unless it becomes a repeated pattern.
B) Flag the local value as a token violation because bracketed literal style values are disallowed by category.
C) Add a global token for 250vh so the audit passes even though only this section uses it.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "chooses_review_prompt"
description = "The response chooses option A or treats the scanner output as a review prompt rather than proof of a violation."

[[scenario.criteria]]
key = "keeps_local_scroll_value"
description = "The response keeps the local scroll-distance value because it is not repeated and does not define a reusable semantic role."

[[scenario.criteria]]
key = "does_not_add_global_scroll_token"
description = "The response does not add a global token for a one-off local scroll distance."

[[scenario.criteria]]
key = "explains_judgment"
description = "The response explains that scanner findings require judgment against existing semantic roles and reuse."
