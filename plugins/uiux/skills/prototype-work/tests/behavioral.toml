[suite]
name = "uiux-prototype-work"
skill = "prototype-work"
skill_path = "plugins/uiux/skills/prototype-work/SKILL.md"
scenario_env = "UIUX_PROTOTYPE_WORK_SCENARIO"
judge_context = """
Loaded skill under test: prototype-work. Judge whether the response stays
focused on prototype reference apps, setup under designs/, browser evidence,
compact context reports, mock separation, and concise PRD consolidation.
"""

[[scenario]]
id = "reference-app-not-found"
user_request = """
The user asks for a prototype flow change, but the worktree has no designs/ directory and no app path was provided.

Options:
A) Stop and ask the user for the reference app path before doing anything else.
B) Search the entire repo for any React app and pick the first package.json.
C) Continue by editing docs first while waiting for an app path.
"""

[[scenario.criteria]]
key = "chooses_stop_and_ask"
description = "The response chooses option A or clearly stops and asks for the reference app path before doing anything else."

[[scenario.criteria]]
key = "does_not_edit_without_app_path"
description = "The response does not edit files, docs, or code before the reference app path is provided."

[[scenario.criteria]]
key = "reruns_with_app_root"
description = "The response plans to rerun the preparation script with --app-root after the user provides the path."

[[scenario]]
id = "new-user-flow-requires-prd-and-mocks"
user_request = """
The user asks to add a new onboarding flow to the prototype, with mocked eligibility rules and a simulated API fetch that can load, succeed, return no eligible result, or fail. They ask you to list every companion obligation before editing.

What must accompany the prototype change?
"""

[[scenario.criteria]]
key = "updates_prd_for_behavior_change"
description = "The response updates PRD.md because product behavior changed."

[[scenario.criteria]]
key = "keeps_prd_business_only"
description = "The response keeps PRD content limited to business rules and product behavior when describing what to write; broad trigger conditions for PRD consolidation do not count as PRD content."

[[scenario.criteria]]
key = "adds_explicit_mocks"
description = "The response adds explicit mocks for the eligibility rule and API-like fetch."

[[scenario.criteria]]
key = "adds_async_states"
description = "The response includes loading, success, empty, and error behavior for the async prototype flow."

[[scenario.criteria]]
key = "uses_browser_navigation"
description = "The response exercises the changed flow through browser navigation and browser evidence."

[[scenario]]
id = "compact-context-reports"
user_request = """
The user asks for a new dashboard panel in the prototype. The app has root-level PRD.md, DESIGN.md, and brandvoice.md, plus existing mock data and routes.

What context should the agent gather before changing the prototype?
"""

[[scenario.criteria]]
key = "gathers_product_report"
description = "The response gathers a compact product report from PRD.md."

[[scenario.criteria]]
key = "gathers_voice_report"
description = "The response gathers a compact voice report from brand-voice guidance."

[[scenario.criteria]]
key = "gathers_design_report"
description = "The response gathers a compact design report from DESIGN.md."

[[scenario.criteria]]
key = "scopes_app_structure"
description = "The response scopes routes, mock boundaries, theme configuration, component inventory, and design-system configuration."

[[scenario.criteria]]
key = "does_not_dump_raw_docs"
description = "The response avoids dumping raw companion docs into the main context."

[[scenario]]
id = "production-port-code-mapping-handoff"
user_request = """
The user has a finished designs/ prototype flow and wants production planning
next. The prototype includes multiple routes, visible states, mocked business
rules, and mocked integration behavior.

What should the prototype-work response hand off before production code is mapped?
"""

[[scenario.criteria]]
key = "prepares_prototype_side_mapping"
description = "The response prepares prototype-side route, state, visible element, interaction, and mock-boundary context before asking for production code mapping."

[[scenario.criteria]]
key = "uses_code_mapper_agent"
description = "The response routes production code mapping to the native code-mapper agent rather than referencing a retired skill or doing production implementation inside prototype-work."

[[scenario.criteria]]
key = "labels_uncertain_counterparts"
description = "Known or suspected production route, state, selector, test, or component counterparts are labeled as known or uncertain instead of being invented."

[[scenario.criteria]]
key = "preserves_prototype_boundary"
description = "The response treats the handoff as preparation for downstream planning, implementation, verification, or visual parity work, not as permission to edit production code."
