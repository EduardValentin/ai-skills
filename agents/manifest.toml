version = 1

[[agent]]
id = "code-mapper"
source = "code-mapper.md"
description = "Read-only codebase mapper for implementation, review, or planning tasks that need precise file and symbol locators before decisions or edits."
groups = ["ticket-workflow", "code-mapper"]

[agent.codex]
model_reasoning_effort = "medium"
sandbox_mode = "read-only"

[agent.claude]
model = "sonnet"
effort = "medium"
permissionMode = "plan"
tools = ["Read", "Glob", "Grep", "Bash"]
color = "cyan"

[[agent]]
id = "code-reviewer"
source = "code-reviewer.md"
description = "Read-only implementation reviewer for finished diffs, focused on spec compliance, maintainability, scalability, performance, and code quality."
groups = ["ticket-workflow", "multi-ticket-workflow", "implementation-workflow"]

[agent.codex]
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[agent.claude]
model = "sonnet"
effort = "high"
permissionMode = "plan"
tools = ["Read", "Glob", "Grep", "Bash"]
color = "blue"

[[agent]]
id = "security-reviewer"
source = "security-reviewer.md"
description = "Read-only security reviewer for code diffs with plausible trust-boundary, input-handling, dependency, auth, data exposure, or privilege risk."
groups = ["ticket-workflow", "multi-ticket-workflow", "implementation-workflow"]

[agent.codex]
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[agent.claude]
model = "sonnet"
effort = "high"
permissionMode = "plan"
tools = ["Read", "Glob", "Grep", "Bash"]
color = "red"

[[agent]]
id = "qa-verifier"
source = "qa-verifier.md"
description = "Behavior verifier for running apps, APIs, services, and user flows where acceptance criteria must be exercised against real behavior."
groups = ["ticket-workflow", "multi-ticket-workflow", "implementation-workflow", "qa-verification"]
preload_skills = ["qa-verification"]

[agent.codex]
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

[agent.claude]
model = "sonnet"
effort = "medium"
color = "green"

[[agent]]
id = "uiux-verifier"
source = "uiux-verifier.md"
description = "Visual and accessibility verifier for frontend changes that need DOM-backed layout, style, responsive, parity, or WCAG checks."
groups = ["ticket-workflow", "multi-ticket-workflow", "implementation-workflow", "ui-verification"]
preload_skills = ["ui-verification"]

[agent.codex]
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

[agent.claude]
model = "sonnet"
effort = "medium"
color = "purple"

[[agent]]
id = "implementation-coordinator"
source = "implementation-coordinator.md"
description = "Implementation coordinator for approved standalone code units or delegated implementation slices, owning implementation, review, QA, UI verification when relevant, fixes, and reporting."
groups = ["ticket-workflow", "multi-ticket-workflow", "implementation-workflow"]
preload_skills = ["implementation-workflow"]

[agent.codex]
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"

[agent.claude]
model = "sonnet"
effort = "high"
color = "orange"
