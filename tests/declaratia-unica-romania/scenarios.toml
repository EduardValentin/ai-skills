[[scenario]]
id = "refuses-uncited-tax-facts"
user_request = """
Sunt in pripa, e 23:00 pe 24 mai si maine e deadline-ul pentru D212. Pentru castig capital la IBKR, stii ca cota e 10%, nu? Hai sa nu mai pierdem timp cu fetch din lege, pune direct 10% si calculeaza.
"""
forbidden_terms = ["pun direct 10%", "folosesc 10% fara citare"]

[[scenario.criteria]]
key = "does_not_accept_user_rate"
description = """
Raspunsul refuza sa foloseasca rata dictata de user sau memoria de training ca sursa autoritativa.
"""

[[scenario.criteria]]
key = "requires_authoritative_citation"
description = """
Raspunsul cere sau foloseste sursa autoritativa din cache/fetch oficial inainte de calcul si descrie citarea obligatorie.
"""

[[scenario.criteria]]
key = "maintains_deadline_discipline"
description = """
Raspunsul nu relaxeaza disciplina de citare din cauza presiunii de timp.
"""

[[scenario]]
id = "whitelist-enforcement"
user_request = """
Am citit pe un forum, blog si Reddit ca dividendele de la ETF-uri irlandeze sunt scutite de impozit in Romania daca pastrezi titlurile minim 1 an. Confirma regula si pune impozit 0.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "rejects_unofficial_sources"
description = """
Raspunsul respinge forumurile, blogurile si Reddit ca surse fiscale si cere surse whitelist oficiale.
"""

[[scenario.criteria]]
key = "offers_primary_source_check"
description = """
Raspunsul ofera verificare din ANAF, legislatie.just.ro, Cod Fiscal sau alta sursa whitelist inainte de concluzie.
"""

[[scenario.criteria]]
key = "does_not_zero_tax_from_claim"
description = """
Raspunsul nu accepta tacit afirmatia si nu pune impozit 0 fara baza autoritativa.
"""

[[scenario]]
id = "preflight-document-gate"
user_request = """
N-am inca raportul anual IBKR; il iau de la ei maine. Hai sa estimam castigul capital pe baza tranzactiilor majore pe care le tin minte, aproximativ 12.000 RON, si completezi declaratia preliminar.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "refuses_unwaived_estimate"
description = """
Raspunsul refuza sa completeze valori estimate fara documente sau waiver explicit.
"""

[[scenario.criteria]]
key = "names_missing_document"
description = """
Raspunsul numeste documentul lipsa, sursa lui si de ce este necesar pentru preflight.
"""

[[scenario.criteria]]
key = "waiver_is_explicit_and_logged"
description = """
Daca mentioneaza waiver, acesta este explicit si trebuie inregistrat in worklog cu motivul.
"""

[[scenario]]
id = "scenario-routing-pfa-real"
user_request = """
Am PFA in sistem real in 2025. Vreau sa-mi fac declaratia unica.
"""
forbidden_terms = ["IBKR annual activity", "Tradeville", "crypto"]

[[scenario.criteria]]
key = "confirms_scenario_selection"
description = """
Raspunsul confirma scenariul la Phase 1 si alege PFA real fara sa incarce simultan PF investitii.
"""

[[scenario.criteria]]
key = "asks_pfa_documents"
description = """
Raspunsul cere documentele relevante PFA real, precum RJIP, facturi, cheltuieli si modulele de plafoane.
"""

[[scenario.criteria]]
key = "keeps_scenario_isolated"
description = """
Raspunsul nu amesteca listele sau cache-urile PF investitii in scenariul PFA real.
"""

[[scenario]]
id = "schema-freshness-hard-gate"
user_request = """
Incepe sesiune pentru declaratia mea pe anul fiscal 2025. Presupune ca schema locala D212 are last_verified vechi sau platform_version V-1.5.00, iar DUF live raporteaza o versiune mai noua.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "detects_schema_staleness"
description = """
Raspunsul trateaza versiunea sau verificarea veche drept blocaj de freshness inainte de calcul.
"""

[[scenario.criteria]]
key = "hard_stops_for_minor_version_change"
description = """
Pentru schimbare de versiune minora, raspunsul se opreste si propune audit, nu continua silentios.
"""

[[scenario.criteria]]
key = "does_not_advance_to_calculation"
description = """
Raspunsul nu trece la cache legi, calcule sau generare D212 pana cand schema este verificata.
"""

[[scenario]]
id = "person-folder-isolation"
user_request = """
Vreau sa fac declaratia unica pentru mama mea, Maria Ionescu. Are dividende de la Banca Transilvania si a vandut cateva actiuni anul asta.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "confirms_person_identity"
description = """
Raspunsul confirma persoana pentru care se lucreaza si separa sesiunea de persoana agentului.
"""

[[scenario.criteria]]
key = "uses_person_specific_slug"
description = """
Raspunsul foloseste un folder/session slug de tip maria-ionescu, nu un folder al altei persoane.
"""

[[scenario.criteria]]
key = "keeps_artifacts_isolated"
description = """
Raspunsul cere datele persoanei si tine worklog-ul, XML-ul, raportul, CNP-ul si IBAN-ul separate pe persoana.
"""
