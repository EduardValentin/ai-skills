[[scenario]]
id = "backend-api-live-behavior"
user_request = """
Use the loaded qa-verification skill for a backend API change. Acceptance criteria require validating successful creation, duplicate rejection, auth boundaries, persisted state, and error payloads against the running service.
"""
forbidden_terms = ["unit tests are enough", "clean because tests passed", "before Ship", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "live_service_behavior"
description = """
The QA approach requires validating the running backend/service through programmatic probes against the implemented surface rather than relying on unit tests or code inspection.
"""

[[scenario.criteria]]
key = "covers_api_outcomes"
description = """
The QA approach covers successful creation, duplicate rejection, auth boundaries, persisted state, state transitions, side effects, and error payloads.
"""

[[scenario.criteria]]
key = "maps_acceptance_criteria_to_evidence"
description = """
The response requires the QA report to map each acceptance criterion to concrete observations and evidence.
"""

[[scenario.criteria]]
key = "bug_report_boundary"
description = """
The response includes a BUGS FOUND verdict path for failed behavior and requires reproduction steps and evidence for each bug.
"""

[[scenario]]
id = "ui-behavior-states"
user_request = """
Use the loaded qa-verification skill for a user-facing settings form. Exercise loading, empty, success, error, validation, disabled, rapid-click, and navigation-mid-save behavior in the running app.
"""
forbidden_terms = ["visual parity", "style review", "UI/UX", "before Ship"]

[[scenario.criteria]]
key = "running_app_ui_behavior"
description = """
The QA approach requires exercising the user-facing settings form through actual UI or browser actions against the running app.
"""

[[scenario.criteria]]
key = "covers_named_states_and_interactions"
description = """
The QA approach covers loading, empty, success, error, validation, disabled, rapid-click, and navigation-mid-save behavior.
"""

[[scenario.criteria]]
key = "reports_evidence_and_verdict"
description = """
The response describes a QA report with verdict, coverage performed, evidence, bugs, blockers, and notes.
"""

[[scenario]]
id = "mixed-api-and-ui"
user_request = """
Use the loaded qa-verification skill for a mixed invite flow where the invite API and invite form changed together. Verify backend behavior, browser-observed behavior, and the integration between them.
"""
forbidden_terms = ["only backend", "only ui", "before Ship", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "mixed_mode_covers_backend_and_ui"
description = """
The QA approach covers both invite API/backend behavior with programmatic probes and browser-observed invite form behavior.
"""

[[scenario.criteria]]
key = "integration_between_surfaces"
description = """
The response prefers running the GUI and backend/service together for end-to-end verification, or states a limitation and verifies each surface plus the integration contract separately.
"""

[[scenario.criteria]]
key = "reports_acceptance_coverage"
description = """
The response describes a QA report that ties checks, results, findings, and evidence back to acceptance criteria.
"""

[[scenario]]
id = "frontend-pr-metadata-blocked"
user_request = """
Use the loaded qa-verification skill for a frontend PR. The local diff and ticket ID are available, but the browser PR page is blocked by authentication and there is time pressure to test from the diff. You have not yet tried MCP, API, CLI, or authenticated local metadata.
"""
forbidden_terms = ["best-effort browser testing", "clean because the diff", "frontend-pr-test", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "blocked_metadata_blocks_qa"
description = """
The response requires attempting PR/ticket access through available tooling such as MCP, API, CLI, or authenticated metadata before QA can proceed.
"""

[[scenario.criteria]]
key = "asks_for_missing_details"
description = """
The response asks the caller for ticket/PR details, acceptance criteria, implemented surface area, and testing instructions if PR/ticket metadata tooling is unavailable.
"""

[[scenario.criteria]]
key = "diff_scope_is_last_resort"
description = """
The response uses diff scoping only as a fallback when metadata and caller-provided details remain unavailable, and labels the inferred scope as provisional.
"""

[[scenario]]
id = "frontend-pr-readable-no-testing-notes"
user_request = """
Use the loaded qa-verification skill for a frontend PR. PR metadata and the ticket are readable, but the PR has no testing section. The ticket says users can filter saved places by status, and the diff changes a filter panel and badge count.
"""
forbidden_terms = ["QA cannot proceed because notes are absent", "frontend-pr-test", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "does_not_block_when_metadata_read"
description = """
The response proceeds because PR metadata was read successfully even though testing notes are absent.
"""

[[scenario.criteria]]
key = "scopes_before_browser_testing"
description = """
The response scopes from PR metadata, ticket criteria, diff, changed files, UI entry points, setup/data needs, implemented surface, and regression risks before browser testing.
"""

[[scenario.criteria]]
key = "manual_browser_acceptance"
description = """
The response uses manual browser click-through and rendered outcome inspection as the required evidence for UI QA.
"""

[[scenario]]
id = "frontend-pr-user-supplied-notes"
user_request = """
Use the loaded qa-verification skill for a frontend PR. The PR host is unavailable, but the user pasted the PR testing notes: verify saved-place filters for Active, Archived, and All, and confirm the counter updates after archiving an item. The local diff is available.
"""
forbidden_terms = ["frontend-pr-test", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "uses_user_supplied_metadata"
description = """
The response proceeds using the user-supplied PR testing notes and records that metadata source.
"""

[[scenario.criteria]]
key = "maps_notes_to_behavior"
description = """
The response maps the pasted notes to browser behavior for Active, Archived, All, and counter update after archiving.
"""

[[scenario.criteria]]
key = "diff_only_scopes_risk"
description = """
The response uses the diff to scope affected routes, setup, implemented surfaces, and risks, not as a substitute for available PR notes.
"""

[[scenario]]
id = "qa-reports-bugs-does-not-fix"
user_request = """
Use the loaded qa-verification skill to QA this settings form and fix anything you find. The app is running at http://localhost:3000/settings with a seeded test user, and a test control can force the next save to fail. Acceptance criteria require disabled submit while saving and an error message when save fails.
"""
forbidden_terms = ["implemented the fix", "patched the code", "updated the component", "committed the fix"]

[[scenario.criteria]]
key = "plans_running_surface_exercise"
description = """
The response plans QA by exercising the running settings form through browser behavior rather than editing code.
"""

[[scenario.criteria]]
key = "report_requires_bug_evidence"
description = """
The response requires any observed disabled-submit or save-error failure to be reported as BUGS FOUND with reproduction steps and evidence.
"""

[[scenario.criteria]]
key = "leaves_fixes_to_implementation"
description = """
The response refuses to fix code while acting as QA and leaves fixes for a separate implementation request.
"""
