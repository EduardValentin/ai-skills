prompt = """
Clean up these draft epics and stories before publishing: make titles plain,
separate business overview from technical details, add real acceptance criteria,
remove parent/child duplication, and make event/API output contracts explicit.
"""

[[scenario]]
id = "linear-issue-writing-approved-drafts"
skill = "linear-issue-writing"
prompt = "Publish these approved epic and user story drafts into Linear, with the right parent-child structure and duplicate checks."

[[scenario]]
id = "use-linear-graphql-keychain"
skill = "use-linear"
prompt = "Linear MCP is disabled. Use my saved API key to find the right Linear project, avoid duplicates, and create the approved issue through GraphQL."
description_terms = ["Linear GraphQL API", "MCP is unavailable or disabled", "macOS Keychain"]
skill_terms = ["course-platform.linear-api-key", "security find-generic-password", "Authorization: <token>"]

