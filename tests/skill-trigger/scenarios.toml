# Global trigger coverage for canonical skills under skills/.
# Each scenario asserts that a user prompt should make one skill get picked up.

[[scenario]]
id = "declaratia-d212-investments"
skill = "declaratia-unica-romania"
prompt = "Complete my Romanian D212 for dividends from Romania and capital gains from IBKR."

[[scenario]]
id = "github-interaction-bot-pr-write"
skill = "github-interaction"
prompt = """
Create a GitHub PR comment for my personal project using the configured GitHub
App bot identity. Do not post it with my ambient personal gh credentials.
"""

[[scenario]]
id = "qa-verification-backend-api"
skill = "qa-verification"
prompt = """
QA this backend API change against the acceptance criteria. Unit tests passed,
but I need endpoint behavior, persistence, auth, and error responses verified
against the running service.
"""

[[scenario]]
id = "qa-verification-ui-behavior"
skill = "qa-verification"
prompt = """
QA this user-facing UI change. Exercise loading, empty, success, error,
validation, disabled, and rapid-click behavior in the running app.
"""

[[scenario]]
id = "qa-verification-mixed-flow"
skill = "qa-verification"
prompt = """
QA this mixed ticket where the invite API and invite form changed together.
Verify both the API behavior and the browser-observed user flow.
"""

[[scenario]]
id = "verify-pr-pr-checks"
skill = "verify-pr"
prompt = """
Implementation and review are complete; do not review the diff. Verify PR #42
linked to Linear ticket APP-123 from In Review: fetch PR metadata, required
checks, implemented-surface test evidence, review approval, and unresolved
comments before reporting whether it is ready.
"""

[[scenario]]
id = "verify-pr-merge-monitoring"
skill = "verify-pr"
prompt = """
The latest PR readiness report says Jira ticket PROJ-44 is in Code Review and
PR #44 is ready. I explicitly approve merging the PR; merge it and monitor
post-merge CI, reporting any failing source-control checks with a proposed
action plan.
"""

[[scenario]]
id = "verify-pr-unresolved-comments"
skill = "verify-pr"
prompt = """
Verify whether PR #70 is ready for final approval. CI and surface tests are
passing, but the source-control review metadata may have unresolved review
threads or requested changes that must block readiness.
"""

[[scenario]]
id = "verify-pr-after-pr-created-for-review"
skill = "verify-pr"
prompt = """
Create the PR for this completed Jira ticket so I can review it. Implementation,
QA, and review reports are clean; after opening the PR, confirm whether anything
blocks it from being ready for review.
"""

[[scenario]]
id = "codebase-scope-map-implementation-handoff"
skill = "codebase-scope-map"
prompt = "Before implementing this ticket, map the relevant code surface for downstream agents with file:line locators, entry points, modules, affected surfaces, tests, patterns, dependencies, conflicts, and keep it token-efficient."

[[scenario]]
id = "codebase-scope-map-delegated-scoping"
skill = "codebase-scope-map"
prompt = """
You are a Scoping subagent in a ticket workflow. Map the codebase for this
implementation task as a token-efficient navigable scope map with file:line
locators, tests, types/contracts, analogous implementations, dependencies,
prototype/reference elements where relevant, affected surfaces, conflict points, and downstream slices.
This scoping task is read-only: do not edit, format, generate, stage, commit, or clean up repository files.
"""

[[scenario]]
id = "ui-verification-runnable-reference"
skill = "ui-verification"
prompt = "Compare the implemented React dashboard against the runnable designs/ reference app and make sure every visible element matches the prototype before release."

[[scenario]]
id = "ui-verification-production-consistency"
skill = "ui-verification"
prompt = "Review implemented frontend UI for visual consistency against production analogs. For the new settings panel, produce a matched-element inventory against existing settings/profile panels with computed-style comparison, bounding-rect comparison, accessibility states, and a structured verdict."

[[scenario]]
id = "ui-verification-delegated-uiux-gate"
skill = "ui-verification"
prompt = """
You are a UI/UX verification subagent in a ticket workflow.
Review the implemented frontend UI against the runnable prototype/reference app
for visual parity. Build the matched-element inventory from the affected surface
map, approved artifacts, changed UI files, and live DOM inspection. Compare DOM
computed styles and bounding rects for every row, check keyboard, focus, contrast,
and accessibility, then return a structured verdict and findings.
"""

[[scenario]]
id = "ui-verification-missing-inventory-scoping"
skill = "ui-verification"
prompt = """
Verify this frontend change against the ticket description and diff. No affected-element
inventory was provided, so scope the visible element inventory first from the diff,
ticket description, changed UI files, routes, and reference or production comparison basis.
"""

[[scenario]]
id = "qa-verification-frontend-pr-acceptance"
skill = "qa-verification"
prompt = "QA this frontend PR against the acceptance criteria and PR notes, then tell me whether the browser behavior passes with evidence."

[[scenario]]
id = "pr-reviewer-summary-current-branch"
skill = "pr-reviewer-summary"
prompt = "Generate a reviewer-friendly PR description for the current branch with Summary of Changes, Manual Testing, and reviewer notes."

[[scenario]]
id = "prototype-work-flow-change"
skill = "prototype-work"
prompt = "In the React prototype reference app under designs/, add a new onboarding page with mocked eligibility rules, a mocked CRM handoff, and browser validation."

[[scenario]]
id = "manage-prd-business-rule-update"
