prompt = "Compare the implemented React dashboard against the runnable designs/ reference app and make sure every visible element matches the prototype before ship."
description_terms = ["runnable prototype", "visual parity", "matched-element inventories", "DOM computed styles/bounding rects"]
skill_terms = ["Matched-element inventory", "scripts/extract-element-style.browser.js", "Parity Review"]
forbidden_terms = []

[[scenario]]
id = "prototype-parity-review-delegated-uiux-gate"
skill = "prototype-parity-review"
prompt = """
You are a UI/UX verification subagent in a ticket workflow.
Review the implemented frontend UI against the runnable prototype/reference app
for visual parity. Build the matched-element inventory from the affected surface
map, approved artifacts, changed UI files, and live DOM inspection. Compare DOM
computed styles and bounding rects for every row, check keyboard, focus, contrast,
and accessibility, then return a structured verdict and findings.
"""
description_terms = ["implemented frontend UI", "visual parity", "DOM computed styles/bounding rects"]
skill_terms = ["Parity Review", "Accessibility", "affected surface map"]
forbidden_terms = []

