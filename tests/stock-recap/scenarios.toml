[suite]
name = "stock-recap"
skill = "stock-recap"
skill_path = "skills/stock-recap/SKILL.md"
agent_env = "STOCK_RECAP_AGENT_COMMAND"
scenario_env = "STOCK_RECAP_SCENARIO"
prompt_instructions = """
Do not fetch market data or write research files. Return only the recap workflow, gates, mode routing, checkpoint behavior, and blocker handling.
"""
judge_context = """
Loaded skill under test: stock-recap. Judge prerequisite gates, mode routing, filing/valuation flow, sell-trigger evaluation, and update checkpoints.
"""
[[scenario]]
id = "quarterly-recap-existing-thesis"
user_request = """
Catch me up on MSFT since the last thesis. The saved thesis exists, new 10-Q/10-K filings may have landed, and I want sell triggers evaluated against the saved bull/base/bear projections.
"""
forbidden_terms = ["technical analysis", "day trade", "skip prior thesis"]

[[scenario.criteria]]
key = "checks_prior_research_preconditions"
description = """
The response requires verdict, projections, financials, market expectations, SEC user-agent, toolkit, and research repo before recapping.
"""

[[scenario.criteria]]
key = "detects_filings_and_routes_mode"
description = """
The response performs gap detection for new 10-Q/10-K filings and uses the mode picker for quarterly catch-up, news mode, valuation-only recap, or exit as appropriate.
"""

[[scenario.criteria]]
key = "mechanically_diffs_actuals_and_triggers"
description = """
The response refreshes financials/valuation and evaluates saved sell triggers in fired/flashing/clear/cannot-evaluate states against saved projections.
"""

[[scenario.criteria]]
key = "uses_checkpoints_before_updates"
description = """
The response uses the required checkpoints and asks before surgical or reclassifying thesis updates and before pushing.
"""

[[scenario]]
id = "missing-prior-thesis-aborts"
user_request = """
Recap a brand-new ticker ABCD that has no existing stock-research artifacts.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "aborts_without_saved_thesis"
description = """
The response refuses to run stock-recap without prior stock-research artifacts such as verdict, projections, financials, and market expectations.
"""

[[scenario.criteria]]
key = "routes_to_initial_research"
description = """
The response instructs the user to run the initial stock research workflow instead of inventing a recap baseline.
"""
