[suite]
name = "execute-ticket-work"
skill = "execute-ticket-work"
skill_path = "skills/execute-ticket-work/SKILL.md"
agent_env = "EXECUTE_TICKET_WORK_AGENT_COMMAND"
scenario_env = "EXECUTE_TICKET_WORK_SCENARIO"
prompt_instructions = """
Do not perform real execution. Return the execution-phase behavior and report expectations only. Explicitly describe how nested delegated subagents are used, or how the limitation is reported if unavailable. Keep it concise and do not name downstream skill identifiers.
"""
judge_context = """
Loaded skill under test: execute-ticket-work. Judge execution-phase boundaries, not exact wording.
"""
[[scenario]]
id = "approved-packet-execution-phase"
user_request = """
An approved execution packet is available for one checkout eligibility work unit. It includes acceptance criteria, approved spec/design, approved implementation plan, scope locators, branch state, dependencies, expected checks, UI applicability, and PR/report expectations. Describe how execution should proceed without doing the work.
"""
forbidden_terms = ["ticket-start", "multi-ticket-work", "implement-unit-of-work", "qa-verification", "ui-verification", "verify-pr", "ticket orchestrator", "best guess"]

[[scenario.criteria]]
key = "validates_packet_first"
description = """
The response validates the approved execution packet and execution boundary before starting work.
"""

[[scenario.criteria]]
key = "coordinates_separate_phases"
description = """
The response coordinates implementation, independent review, QA, UI/UX when applicable, fixes, reruns, and PR preparation as separate phases rather than one combined worker task.
"""

[[scenario.criteria]]
key = "supports_nested_phase_delegation"
description = """
The response uses nested delegated subagents for implementation, independent review, QA, UI/UX verification when applicable, scoped fixes, and PR preparation when the runtime supports it, or reports the limitation when it does not.
"""

[[scenario.criteria]]
key = "does_not_brainstorm_or_change_scope"
description = """
The response does not conduct brainstorming, invent requirements, negotiate scope, or change the approved plan during execution.
"""

[[scenario.criteria]]
key = "requires_phase_evidence_for_completion"
description = """
The response requires PR evidence plus implementation, independent review, QA, UI/UX-or-skip, fixes/reruns, checks, risks, and blockers before completion.
"""

[[scenario.criteria]]
key = "reports_parent_input_needed"
description = """
The response names parent/main-orchestrator input as the path for missing or conflicting approval/scope facts.
"""

[[scenario]]
id = "blocks-missing-approved-packet"
user_request = """
A delegated execution request says only: 'work on the checkout thing and make it pass.' It has no approved spec, no implementation plan, no acceptance criteria, and no approval state. Describe the correct response.
"""
forbidden_terms = ["start anyway", "best guess", "ticket-start", "multi-ticket-work"]

[[scenario.criteria]]
key = "blocks_without_packet"
description = """
The response blocks execution when the approved execution packet is missing required details.
"""

[[scenario.criteria]]
key = "uses_blocked_parent_input_status"
description = """
The response reports BLOCKED_NEEDS_PARENT_INPUT or an equivalent explicit parent-input block.
"""

[[scenario.criteria]]
key = "names_missing_inputs"
description = """
The response names missing inputs such as acceptance criteria, approved spec/design, approved plan, approval state, or scope locators.
"""

[[scenario.criteria]]
key = "does_not_infer_or_brainstorm"
description = """
The response does not infer scope, brainstorm with the human, negotiate requirements, or proceed on a best guess.
"""
