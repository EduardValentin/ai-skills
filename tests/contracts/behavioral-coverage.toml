[suite]
name = "canonical skill behavioral coverage"

[[assertion]]
type = "exists_for_each"
glob = "skills/*/SKILL.md"
path = "{parent}/tests/behavioral.toml"

[[assertion]]
type = "toml_suite_require_fields_for_each"
glob = "skills/*/SKILL.md"
path = "{parent}/tests/behavioral.toml"
fields = [
  "name",
  "skill",
  "skill_path",
  "scenario_env",
  "prompt_instructions",
  "judge_context",
]

[[assertion]]
type = "toml_scenarios_require_field_for_each"
glob = "skills/*/SKILL.md"
path = "{parent}/tests/behavioral.toml"
field = "id"

[[assertion]]
type = "toml_scenarios_require_field_for_each"
glob = "skills/*/SKILL.md"
path = "{parent}/tests/behavioral.toml"
field = "user_request"

[[assertion]]
type = "toml_scenario_criteria_require_field_for_each"
glob = "skills/*/SKILL.md"
path = "{parent}/tests/behavioral.toml"
field = "key"

[[assertion]]
type = "toml_scenario_criteria_require_field_for_each"
glob = "skills/*/SKILL.md"
path = "{parent}/tests/behavioral.toml"
field = "description"

[[assertion]]
type = "absent_glob"
glob = "skills/*/tests/*behavioral_pressure.py"

[[assertion]]
type = "absent_glob"
glob = "skills/*/tests/pressure-scenarios.md"

[[assertion]]
type = "absent_glob"
glob = "skills/*/tests/evals.md"

[[assertion]]
type = "absent_glob"
glob = "skills/*/tests/test-log.md"
