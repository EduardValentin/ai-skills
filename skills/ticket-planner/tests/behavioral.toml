[suite]
name = "ticket-planner"
skill = "ticket-planner"
skill_path = "skills/ticket-planner/SKILL.md"
scenario_env = "TICKET_PLANNER_SCENARIO"
prompt_instructions = """
Do not create tracker issues or edit PRD.md. Return only the planning workflow, questions, ticket-quality fixes, story-slicing behavior, and approval gates.
"""
judge_context = """
Loaded skill under test: ticket-planner. Judge product planning, prototype boundaries, vertical slicing, PRD update gates, and tracker neutrality.
"""
[[scenario]]
id = "prototype-copy-boundary"
user_request = """
Create a story for the onboarding screen. The React prototype shows button text, helper text, placeholders, and visual layout details.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "references_prototype_without_copying_ui_details"
description = """
The response references prototype routes/screens/states without repeating button text, helper text, placeholders, layout, styling, or widget choices unless business-critical or explicitly requested.
"""

[[scenario.criteria]]
key = "story_focuses_business_outcome"
description = """
The response frames the story around user-observable product behavior rather than prototype implementation details.
"""

[[scenario]]
id = "tracker-unavailable-stays-platform-neutral"
user_request = """
Turn the PRD dashboard section into user stories. The issue tracker is not connected.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "tracker_not_required"
description = """
The response produces platform-neutral drafts and does not treat issue-tracker access as required for planning.
"""

[[scenario.criteria]]
key = "no_tracker_metadata_or_creation"
description = """
The response does not include tracker-specific metadata, IDs, or creation steps as part of planning.
"""

[[scenario]]
id = "prd-update-approval"
user_request = """
Clarification: archived plans stay visible to coaches forever but clients cannot see them.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "identifies_business_rule"
description = """
The response identifies this clarification as a business rule or permission/lifecycle rule.
"""

[[scenario.criteria]]
key = "asks_before_prd_edit"
description = """
The response proposes a concise PRD update and asks before editing PRD.md.
"""

[[scenario]]
id = "vertical-slice-pressure"
user_request = """
Split this feature into tickets: database schema, API, frontend, and notifications.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "pushes_back_on_layer_slices"
description = """
The response pushes back on layer-sliced tickets and proposes vertical stories around user outcomes.
"""

[[scenario.criteria]]
key = "integration_points_in_first_viable_story"
description = """
The response ensures relevant UI, API, data, permissions, external systems, notifications, and analytics are covered by the first viable story when applicable.
"""

[[scenario]]
id = "ticket-writing-quality-rules"
user_request = """
Clean up these draft tickets before I publish them. The parent epic repeats child
implementation details, one child title is "Add cert_expiry_sweep.py with
vault_path parameter", the description mixes the business reason with Oracle
paths and event fields in one paragraph, acceptance criteria are buried in prose,
and the output event contract only says "emit the right fields". A stale draft
still mentions the alert-creation ticket, which is now out of scope. One dense
paragraph contains many inline identifiers and human explanations; include how
you would reformat that paragraph.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "plain_outcome_titles"
description = """
The response says titles should be rewritten around the plain work outcome rather than files, parameters, mechanisms, or implementation steps.
"""

[[scenario.criteria]]
key = "separates_business_and_technical_sections"
description = """
The response separates a plain-language business overview from technical details instead of fusing them into one dense paragraph.
"""

[[scenario.criteria]]
key = "dedicated_acceptance_criteria"
description = """
The response requires concrete pass/fail acceptance criteria in the dedicated acceptance-criteria section, not buried in prose.
"""

[[scenario.criteria]]
key = "parent_child_no_duplication"
description = """
The response keeps the parent epic high-level and pushes implementation specifics to child tickets as the authoritative specs, avoiding duplicated parent/child details.
"""

[[scenario.criteria]]
key = "self_contained_contracts_and_current_decisions"
description = """
The response preserves technical substance by making tickets self-contained, enumerating output contracts and conditions, and removing stale out-of-scope alert-creation language across related tickets.
"""

[[scenario.criteria]]
key = "dense_identifiers_are_reformatted"
description = """
The response says dense inline identifiers should become a lead-in plus formatted block, with comment-marked explanations when the right side is commentary rather than content.
"""

[[scenario]]
id = "no-prd-or-prototype"
user_request = """
Create user stories for a new team invitation feature. There is no PRD or prototype yet.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "runs_requirements_brainstorming_first"
description = """
The response does not draft immediately; it runs requirements brainstorming for users, flow, data, permissions, integrations, edge cases, and non-goals.
"""

[[scenario.criteria]]
key = "brief_approval_before_drafting"
description = """
The response produces a shared-understanding brief and waits for user approval before drafting stories.
"""
