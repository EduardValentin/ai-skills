[suite]
name = "implement-unit-of-work"
skill = "implement-unit-of-work"
skill_path = "skills/implement-unit-of-work/SKILL.md"
scenario_env = "IMPLEMENT_UNIT_SCENARIO"
prompt_instructions = """
Do not perform real implementation. Return only the implementation approach and report behavior the implementer should use. Keep it concise.
"""
judge_context = """
Loaded skill under test: implement-unit-of-work. Judge implementation behavior and report boundaries.
"""
[[scenario]]
id = "approved-ad-hoc-script-implementation"
user_request = """
Use the loaded implement-unit-of-work skill for an approved ad hoc request: add a repository script that exports stale feature flags. Acceptance criteria, design direction, implementation plan, and scope notes are approved. Do not edit files; return the implementation approach and final report shape.
"""
forbidden_terms = ["QA verification", "UI/UX verification", "ready to ship", "ready to merge"]

[[scenario.criteria]]
key = "works_for_non_ticket_code_unit"
description = """
The response treats an ad hoc script as a valid implementation unit, not only a ticket work unit.
"""

[[scenario.criteria]]
key = "requires_approved_inputs_and_scope"
description = """
The response depends on approved requirements/design direction, acceptance criteria, implementation plan, and codebase scope before coding.
"""

[[scenario.criteria]]
key = "reads_architecture_broadly"
description = """
The response plans to inspect relevant files beyond the direct edit, including callers, contracts, analogous code, tests, or architecture surfaces.
"""

[[scenario.criteria]]
key = "uses_tdd_when_feasible"
description = """
The response requires TDD for required features or bug fixes when the project harness supports it: write or update a failing test first, observe the expected failure, implement to green, and report the evidence or a concrete skip rationale.
"""

[[scenario.criteria]]
key = "clean_code_standards"
description = """
The response emphasizes clear names, focused responsibilities, three-or-fewer parameters, maintainability, and performance.
"""

[[scenario.criteria]]
key = "delegates_self_review"
description = """
The response requires self-review of the produced work to be delegated to a separate subagent.
"""

[[scenario.criteria]]
key = "implementation_report_shape"
description = """
The response returns an implementation report shape with changed files, TDD evidence or skip rationale, local checks, delegated self-review result, engineering notes, and risks or blockers.
"""

[[scenario]]
id = "blocked-missing-approved-plan"
user_request = """
Use the loaded implement-unit-of-work skill, but the request only says 'add whatever script seems useful' and provides no accepted requirements, acceptance criteria, approved plan, or scope notes. Describe the correct response.
"""
forbidden_terms = ["start coding anyway", "best guess"]

[[scenario.criteria]]
key = "blocks_without_approved_inputs"
description = """
The response blocks implementation when approved requirements, acceptance criteria, implementation plan, or scope are missing.
"""

[[scenario.criteria]]
key = "names_missing_inputs"
description = """
The response names the missing inputs needed before coding can start.
"""

[[scenario.criteria]]
key = "does_not_best_guess"
description = """
The response avoids best-guess coding or inventing scope from an underspecified request.
"""
