[suite]
name = "multi-ticket-work"
skill = "multi-ticket-work"
skill_path = "skills/multi-ticket-work/SKILL.md"
scenario_env = "MULTI_TICKET_WORK_SCENARIO"
judge_context = """
Loaded skill under test: multi-ticket-work. Judge orchestration behavior, not exact wording.
"""
[[scenario]]
id = "epic-ticket-set-delegates-prs-and-review-order"
user_request = """
The Billing Revamp Epic has tickets for pricing API, checkout UI, invoice migration, and analytics events. The user asks to work the whole Epic as one coordinated implementation effort.
"""
forbidden_terms = ["readiness ledger", "implement-unit-of-work", "qa-verification", "ui-verification", "verify-pr", "coordinate-ticket-execution", "ticket orchestrator", "ticket-orchestrator"]

[[scenario.criteria]]
key = "gathers_full_ticket_scope"
description = """
The response gathers every ticket in the Epic or multi-ticket scope, including parent/Epic context when relevant.
"""

[[scenario.criteria]]
key = "maps_sequence_and_parallel_work"
description = """
The response identifies dependencies, sequencing constraints, and which tickets can run in parallel.
"""

[[scenario.criteria]]
key = "aligns_and_approves_before_dispatch"
description = """
The response performs cross-ticket requirements gathering, brainstorming, spec, plan, and user approval before dispatching ticket coordinators.
"""

[[scenario.criteria]]
key = "brainstorms_each_ticket_with_dependencies"
description = """
The response conducts the user-facing alignment across each ticket in scope while considering dependencies, shared risks, boundaries, and success criteria between tickets.
"""

[[scenario.criteria]]
key = "plans_durable_state"
description = """
The response names the durable orchestration note path or intended path and the state it will track: scope, dependency map, approved plan, execution packets or assignments, status, PRs, blockers, decisions, next actions, and re-read checkpoints.
"""

[[scenario.criteria]]
key = "main_agent_coordinates_only"
description = """
The response keeps the main agent as multi-ticket coordinator and does not have it implement ticket work inline.
"""

[[scenario.criteria]]
key = "plans_pr_review_order"
description = """
The response gives an intended PR review order or explains how the final review order will be derived from dependencies or integration risk.
"""

[[scenario]]
id = "prevents-worker-collapse-of-ticket-orchestration"
user_request = """
The Commerce Epic has five independent tickets. A proposed execution note says: 'dispatch immediately before approval; each worker should implement, self-review, QA, run UI checks, push a PR, and the parent session can run one source-control review afterward.'
"""
forbidden_terms = ["readiness ledger", "implement-unit-of-work", "qa-verification", "ui-verification", "verify-pr", "coordinate-ticket-execution", "ticket orchestrator", "ticket-orchestrator"]

[[scenario.criteria]]
key = "rejects_preapproval_dispatch"
description = """
The response rejects dispatching ticket coordinators before cross-ticket requirements, brainstorming, spec, plan, and user approval.
"""

[[scenario.criteria]]
key = "first_level_agents_are_ticket_coordinators"
description = """
The response makes the first-level native agent for each approved ticket or unit ticket-execution-coordinator, with an approved execution packet and dependency context.
"""

[[scenario.criteria]]
key = "ticket_coordinator_prompts_exclude_user_alignment"
description = """
The response says ticket coordinators must not perform user-facing brainstorming, spec creation, plan creation, or approval gathering.
"""

[[scenario.criteria]]
key = "ticket_coordinators_do_not_collapse_into_workers"
description = """
The response rejects prompts where each ticket coordinator directly implements, reviews, QA-checks, UI-checks, and prepares the PR without deeper delegated phase separation.
"""

[[scenario.criteria]]
key = "parent_review_is_not_enough"
description = """
The response says parent-session or source-control review cannot replace independent per-ticket review reports.
"""

[[scenario.criteria]]
key = "completion_needs_distinct_phase_evidence"
description = """
The response requires distinct returned evidence for implementation, independent review, security-review-or-not-applicable, QA, UI/UX-or-not-applicable, fixes/reruns, PR link, and completion report before marking a ticket complete.
"""

[[scenario]]
id = "approved-packet-dispatches-ticket-execution-coordinator"
user_request = """
The Billing Revamp Epic scope, dependency map, cross-ticket spec, and implementation
plan are user-approved. APP-10 invoice migration has an approved execution packet
with ticket context, parent Epic context, approved spec/design, approved plan,
dependency constraints, repository instructions, PR expectations, reviewer-friendly
PR body expectation, and completion-report requirements.
"""
forbidden_terms = ["ticket-start", "coordinate-ticket-execution", "ticket orchestrator", "ticket-orchestrator", "direct implementation", "start brainstorming"]

[[scenario.criteria]]
key = "uses_ticket_coordinator_native_agent"
description = """
The response dispatches ticket-execution-coordinator as the first-level native agent for APP-10 rather than naming a downstream skill or assigning the work to a generic worker.
"""

[[scenario.criteria]]
key = "handoff_is_self_contained"
description = """
The ticket-execution-coordinator handoff includes APP-10 ticket context, Epic or parent context, approved spec/design, approved plan, dependency constraints, repository instructions, PR expectations, completion-report expectations, and downstream dependency notes.
"""

[[scenario.criteria]]
key = "approved_packet_is_execution_boundary"
description = """
The response starts ticket-execution-coordinator from the approved execution packet and does not ask it to gather approval, run user-facing brainstorming, create a spec, or create a plan.
"""

[[scenario.criteria]]
key = "requires_deeper_phase_separation"
description = """
The response tells ticket-execution-coordinator to preserve deeper phase separation for implementation through implementation-worker, independent review, security review when applicable, QA, UI/UX when applicable, fixes, PR preparation, and reporting when nested delegation is available, or to report that limitation.
"""

[[scenario]]
id = "does-not-accept-ticket-report-with-only-test-qa"
user_request = """
A multi-ticket run is collecting the APP-10 ticket coordinator report. APP-10
has a PR link, implementation report, independent review report, security-review
not-applicable reason, UI/UX not-applicable reason, and passing unit tests. The
QA section says only that unit tests passed and code was inspected; it has no
manual/runtime acceptance-criteria evidence from a running API, CLI, job,
browser, service, logs, database, queue, or integration surface. The main agent
is preparing the review-order report for the ticket set.
"""
forbidden_terms = ["APP-10 is complete", "QA clean from tests", "review order is final", "tests satisfy QA"]

[[scenario.criteria]]
key = "keeps_ticket_incomplete"
description = """
The response keeps APP-10 incomplete or blocked because the returned QA section lacks manual/runtime acceptance-criteria evidence.
"""

[[scenario.criteria]]
key = "does_not_accept_tests_as_qa"
description = """
The response treats unit tests and code inspection as checks or context, not as a QA report that can complete the ticket.
"""

[[scenario.criteria]]
key = "requests_manual_qa_followup"
description = """
The response asks for the missing manual/runtime QA evidence or a ticket-coordinator rerun before presenting the final review-order report.
"""
