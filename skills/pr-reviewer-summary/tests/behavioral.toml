[suite]
name = "pr-reviewer-summary"
skill = "pr-reviewer-summary"
skill_path = "skills/pr-reviewer-summary/SKILL.md"
scenario_env = "PR_REVIEWER_SUMMARY_SCENARIO"
prompt_instructions = """
This is a behavioral pressure test. Do not perform external tool calls, run
commands, inspect live systems, mutate files, create branches, create pull
requests, create tracker issues, or complete the real task. Treat scenario facts
as the only available runtime facts. Do not treat these test-harness limits as
runtime blockers unless the scenario itself says the needed access, tooling, or
runtime is unavailable. Answer as the loaded skill would in this mocked
scenario, focusing on the next decision, blocker, or report you would return.
Use the scenario's language. Do not quote the skill text or test criteria.
"""
judge_context = """
Loaded skill under test: pr-reviewer-summary. Judge reviewer usefulness, final-state summarization, context requirements, and manual-testing quality.
"""
[[scenario]]
id = "final-state-pr-body"
user_request = """
Generate a PR description for a branch that added saved-place filtering.

Mocked review context:
- Branch diff summary: final diff changes the filter panel, API query parameter, and active filter badge count behavior.
- Changed files: `FilterPanel`, results query serialization, and active filter badge count logic.
- Recent commits: saved-place filter control, query parameter wiring, badge count update.
- Ticket/conversation context: users need to narrow results to saved places; the work had several iterations and a false start, but the PR description should describe only the final shipped state.
"""
forbidden_terms = ["initially", "after feedback", "then we changed it again"]

[[scenario.criteria]]
key = "gathers_review_context"
description = """
The response requires inspecting branch diff, changed files, recent commits, and available ticket or conversation context before drafting.
"""

[[scenario.criteria]]
key = "summarizes_final_state_only"
description = """
The PR body describes the final shipped behavior and implementation shape, not iteration history, false starts, or chronological fixes.
"""

[[scenario.criteria]]
key = "reviewer_focused_sections"
description = """
The response uses Summary of Changes and Manual Testing, adding Technical Details only when warranted by cross-module or non-obvious logic.
"""

[[scenario.criteria]]
key = "manual_testing_is_actionable"
description = """
Manual testing is written as explicit steps with preconditions, expected results, and changed states or regressions relevant to the diff.
"""

[[scenario]]
id = "missing-diff-blocks"
user_request = """
Write the PR body, but there is no branch diff, changed-file summary, ticket, or PR URL available.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "blocks_without_reliable_context"
description = """
The response stops and asks for PR diff, changed-file summary, PR URL, or other reliable context instead of inventing a PR body.
"""

[[scenario.criteria]]
key = "does_not_fabricate_summary"
description = """
The response does not produce a fake Summary of Changes or Manual Testing from missing context.
"""
