[suite]
name = "pr-reviewer-summary"
skill = "pr-reviewer-summary"
skill_path = "skills/pr-reviewer-summary/SKILL.md"
scenario_env = "PR_REVIEWER_SUMMARY_SCENARIO"
judge_context = """
Loaded skill under test: pr-reviewer-summary. Judge reviewer usefulness, final-state summarization, context requirements, automated-test formatting, complete real-world manual verification, manual command inclusion, and absence of agent-process testing notes.
"""

[[scenario]]
id = "final-state-pr-body"
user_request = """
Generate a PR description for a branch that added saved-place filtering.

Mocked review context:
- Branch diff summary: final diff changes the filter panel, API query parameter, and active filter badge count behavior.
- Changed files: `FilterPanel`, results query serialization, and active filter badge count logic.
- Recent commits: saved-place filter control, query parameter wiring, badge count update.
- Ticket/conversation context: users need to narrow results to saved places; the work had several iterations and a false start, but the PR description should describe only the final shipped state.
- Automated test command: `npm test -- FilterPanel saved-place`
- Manual setup command: `npm run dev`
"""

[[scenario.criteria]]
key = "uses_reliable_context_and_final_state"
description = """
The response uses the mocked diff, changed files, recent commits, and ticket context, and describes final shipped behavior instead of iteration history.
"""

[[scenario.criteria]]
key = "uses_required_sections"
description = """
The PR body uses Summary of Changes, Automated Tests, and Manual Verification, adding Technical Details only when warranted.
"""

[[scenario.criteria]]
key = "automated_tests_are_formatted"
description = """
Automated Tests contains the automated test command in a fenced code block and preserves command line breaks when commands span multiple lines.
"""

[[scenario.criteria]]
key = "manual_verification_is_complete_real_world_and_command_backed"
description = """
Manual Verification includes as many steps as needed, uses reviewer-run commands in fenced code blocks, expects real app/system behavior with real dependencies where practical, and keeps automated test runner commands out.
"""

[[scenario]]
id = "separates-automated-tests-from-manual-verification"
user_request = """
Generate a PR description for a branch that added a billing export CSV download.

Mocked review context:
- Branch diff summary: final diff adds an Export CSV button to the billing page, calls the new `/api/billing/export` endpoint, and shows an inline error when the export fails.
- Changed files: billing page toolbar, export API route, toast/error messaging, and billing route tests.
- Recent commits: export endpoint, toolbar button, error state, tests.
- Ticket/conversation context: finance admins need to download filtered invoice rows from the billing page.
- Automated test commands:
  npm test -- billing-export
  npm run test:e2e -- billing-export.spec.ts
- Manual setup command: npm run dev
- Manual failure command:
  curl -X POST http://localhost:3000/test-support/billing-export-failure --data '{"enabled":true}' -H 'content-type: application/json'
- Real-world verification expectation: use the running app and real billing export path. Use the test-support failure toggle only because causing the export dependency to fail naturally is hard to configure safely.
- Manual flow to cover: open the billing page, apply an invoice status filter, click Export CSV, confirm the downloaded file contains only the filtered rows, then force the export endpoint to fail and confirm the inline error appears.
"""

[[scenario.criteria]]
key = "separates_automated_and_manual_verification"
description = """
The PR body has separate Automated Tests and Manual Verification sections; automated test runner commands appear only in Automated Tests.
"""

[[scenario.criteria]]
key = "manual_section_is_complete_real_world_and_command_backed"
description = """
Manual Verification includes the app startup command and failure-state command in fenced code blocks, covers the happy path plus failure state, and treats the failure toggle as a fallback for a hard-to-configure real dependency failure.
"""

[[scenario.criteria]]
key = "omits_agent_process_notes"
description = """
The PR body does not mention the agent's test process, screenshots, tool usage, environment limits, or whether the agent personally ran the app.
"""

[[scenario]]
id = "missing-diff-blocks"
user_request = """
Write the PR body, but there is no branch diff, changed-file summary, ticket, or PR URL available.
"""

[[scenario.criteria]]
key = "blocks_without_reliable_context"
description = """
The response stops and asks for PR diff, changed-file summary, PR URL, or other reliable context instead of inventing Summary of Changes, Automated Tests, or Manual Verification.
"""
