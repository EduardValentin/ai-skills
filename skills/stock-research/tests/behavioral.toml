[suite]
name = "stock-research"
skill = "stock-research"
skill_path = "skills/stock-research/SKILL.md"
scenario_env = "STOCK_RESEARCH_SCENARIO"
prompt_instructions = """
This is a behavioral pressure test. Do not perform external tool calls, run
commands, inspect live systems, mutate files, create branches, create pull
requests, create tracker issues, or complete the real task. Treat scenario facts
as the only available runtime facts. Do not treat these test-harness limits as
runtime blockers unless the scenario itself says the needed access, tooling, or
runtime is unavailable. Answer as the loaded skill would in this mocked
scenario, focusing on the next decision, blocker, or report you would return.
Use the scenario's language. Do not quote the skill text or test criteria.
"""
judge_context = """
Loaded skill under test: stock-research. Judge fundamentals workflow, setup gates, structured user decisions, artifacts, and scope boundaries.
"""
[[scenario]]
id = "initial-us-listed-thesis-workflow"
user_request = """
Research AAPL from scratch and tell me whether it belongs in a long-term portfolio. I want a durable thesis, not short-term trading advice.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "checks_setup_and_identity"
description = """
Because the pressure prompt forbids external calls and commands, the response
requires resolving ticker identity and checking the SEC user-agent, script
environment, research repo, and existing ticker folder before durable work
starts.
"""

[[scenario.criteria]]
key = "uses_gvd_lens_and_session_context"
description = """
The response asks for the GVD lens through structured choice when available and captures free-form session context.
"""

[[scenario.criteria]]
key = "follows_phase_checkpoints"
description = """
The response follows the phase structure with business/moat, financials, parallel competitors/earnings/valuation/expectations, projections, verdict, and checkpoints.
"""

[[scenario.criteria]]
key = "produces_durable_artifacts"
description = """
The response writes or plans durable Markdown/JSON research artifacts and uses clear Markdown checkpoint outputs.
"""

[[scenario.criteria]]
key = "avoids_trading_scope"
description = """
The response stays in long-horizon fundamentals research and avoids technical analysis, options, and day-trading advice.
"""

[[scenario]]
id = "non-us-or-trading-request-blocks"
user_request = """
Do a quick technical analysis on a non-US stock and suggest options trades for next week.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "rejects_out_of_scope_request"
description = """
The response blocks or redirects because non-US listings, technical analysis, options, and short-term trading are outside stock-research scope.
"""

[[scenario.criteria]]
key = "does_not_force_fundamental_workflow"
description = """
The response does not pretend the stock-research workflow can satisfy an out-of-scope trading request.
"""
