[suite]
name = "ticket-start delegated execution"
skill = "ticket-start"
skill_path = "skills/ticket-start/SKILL.md"
scenario_env = "TICKET_START_BEHAVIOR_SCENARIO"
prompt_instructions = """
This is a behavioral pressure test. Do not perform external tool calls, edit
files, run commands, create branches, create pull requests, or execute the
ticket. Answer the scenario as the loaded skill would, focusing on the correct
next workflow decisions and boundaries. Include enough concrete detail to make
the decisions, handoffs, required evidence, and blockers clear. Do not quote the
skill text or test criteria.
"""
judge_context = """
Loaded skill under test: ticket-start. Judge the routing plan, not exact wording.
"""
[[scenario]]
id = "ticket-start-execution-corectness"
user_request = """
A user asks to start one Linear issue APP-812. The issue is a child under an Epic, adds a billing eligibility business rule, modifies a checkout UI component with a matching reference surface, and may require backend, UI, migration, and analytics work. The user has not yet confirmed the requirements/design understanding, approved a spec, or approved an implementation plan. Explain the correct main-agent workflow from intake through final handoff.
"""
forbidden_terms = ["Depth budget:", "IMPLEMENTATION_SLICE_RESULT", "BROWSER_VERIFICATION_RESULT", "Root -> child -> grandchild", "orchestration map", "leaf-only", "grandchild", "four Linear tickets", "I would implement inline", "qa-verification", "implement-unit-of-work", "multi-ticket-work", "verify-pr", "ui-verification", "ticket-execution-coordinator", "TodoWrite", "two-stage review", "spec compliance reviewer", "code quality reviewer", "ticket orchestrator", "ticket-orchestrator", "does not define", "does not prescribe"]

[[scenario.criteria]]
key = "ticket_start_is_single_ticket_router"
description = """
The response treats this as one standalone ticket handled by the main agent as user-facing orchestrator, not as multi-ticket work or inline implementation.
"""

[[scenario.criteria]]
key = "intake_happens_first"
description = """
The response starts by re-reading the ticket through MCP or API, capturing title, description, acceptance criteria, links, status, dependencies, ambiguity, and parent/Epic context before brainstorming or planning.
"""

[[scenario.criteria]]
key = "artifact_and_repo_freshness"
description = """
The response gathers only relevant PRD/design/reference context, reads repo instructions, inspects git/branch/PR/recent commit state, fetches origin/main, and creates or verifies a fresh ticket worktree before implementation decisions.
"""

[[scenario.criteria]]
key = "scoping_before_planning"
description = """
The response delegates codebase scoping through code-mapper before implementation planning.
"""

[[scenario.criteria]]
key = "brainstorming_before_plan"
description = """
The response runs a user-facing brainstorming session grounded in ticket, parent, artifact, repo, and scoping facts until shared understanding of work, boundaries, and success criteria is reached.
"""

[[scenario.criteria]]
key = "spec_approval_before_plan"
description = """
The response says the brainstorming phase produces the approved spec/design and plan writing is routed only after that spec/design approval.
"""

[[scenario.criteria]]
key = "plan_approval_blocks_execution"
description = """
The response requires explicit user approval of the implementation plan and blocks coding, scaffolding, product mutations, or execution delegation before both spec approval and plan approval.
"""

[[scenario.criteria]]
key = "enters_execution_phase_after_approval"
description = """
After spec and plan approval, the response enters an execution phase using an approved execution packet while the main agent remains the current-session orchestrator.
"""

[[scenario.criteria]]
key = "does_not_handoff_main_ticket_orchestration"
description = """
The response does not hand off main-ticket orchestration to another agent or describe a separate ticket orchestrator.
"""

[[scenario.criteria]]
key = "uses_shared_execution_contract"
description = """
The response says the approved execution phase follows the shared coordinate-ticket-execution contract while ticket-start remains the main coordinator.
"""

[[scenario.criteria]]
key = "uses_implementation_worker"
description = """
The response coordinates implementation through implementation-worker rather than implementing inline.
"""

[[scenario.criteria]]
key = "coordinates_execution_and_verification_loop"
description = """
The response coordinates implementation through implementation-worker, independent review through code-reviewer, security review through security-reviewer when applicable, QA through qa-verifier, UI/UX through uiux-verifier when applicable, scoped fixes, and reruns through delegated work as needed instead of doing them inline.
"""

[[scenario.criteria]]
key = "defines_uiux_verification_by_project_type"
description = """
The response explains that personal/Linear UI/UX verification compares changed production UI against the runnable reference app, while job/Jira UI/UX verification checks visual consistency with the rest of the application and similar existing elements.
"""

[[scenario.criteria]]
key = "forwards_compact_context"
description = """
The response describes compact context included in delegated requests, such as ticket/AC, parent context, approved decisions, approved plan, artifact slices, scope/codebase locators, branch state, constraints, expected checks, and output expectations.
"""

[[scenario.criteria]]
key = "execution_order"
description = """
The response preserves the ticket work order: implement first, verify through independent review plus security review or explicit skip plus QA plus UI/UX when applicable, aggregate findings, delegate scoped fixes, rerun affected verification, then PR verification.
"""

[[scenario.criteria]]
key = "verifier_cannot_verify_fallback"
description = """
The response says delegated QA and UI/UX verifiers must report CANNOT_VERIFY with the reason and missing capability when required tooling or access is unavailable, and the main agent records or handles the blocker.
"""

[[scenario.criteria]]
key = "readiness_requires_resolved_reports"
description = """
The response says PR verification or handoff waits until implementation, independent review, security review or skip, QA, UI/UX or skip, scoped fixes, and necessary reruns are resolved or explicitly blocked/out of scope.
"""

[[scenario]]
id = "ticket-start-start-working-does-not-code"
user_request = """
The user says: "Let's start working on this ticket: https://yesenergy.atlassian.net/browse/SS-2785. We are only concerned with the coding part in this repository and not the alert creation subticket. We are working on a feature branch, so base this worktree and future PR on SS-2766-centralized-monitoring-of-submission-services-components." The agent has read enough ticket and repo context to know likely affected files, but the user has not approved a written spec/design or an implementation plan. Describe the correct immediate behavior.
"""
forbidden_terms = ["Implemented the coding slice", "I implemented it myself", "start coding now", "edit files now", "update_plan is approval"]

[[scenario.criteria]]
key = "start_working_is_not_coding_approval"
description = """
The response treats "start working", "coding part only", feature-branch direction, and investigation progress as permission to continue ticket-start intake/alignment, not as approval to implement.
"""

[[scenario.criteria]]
key = "no_main_session_implementation"
description = """
The response explicitly blocks product-code and test edits in the main session before user-approved spec/design and implementation plan exist.
"""

[[scenario.criteria]]
key = "brainstorming_is_iterative"
description = """
The response routes to user-facing requirements/design alignment with targeted questions or a clear open-questions ledger before spec/design approval, rather than treating the user's "start working" wording as implementation approval.
"""

[[scenario.criteria]]
key = "writes_spec_for_approval"
description = """
The response preserves the written spec/design approval gate before implementation-plan writing.
"""

[[scenario.criteria]]
key = "writes_plan_for_approval"
description = """
The response says an implementation plan must be produced after spec approval and explicitly approved by the user before execution or coding.
"""

[[scenario.criteria]]
key = "internal_plan_is_not_user_approval"
description = """
The response says internal checklists, update plans, working notes, or branch selection do not count as user approval of the spec/design or implementation plan.
"""

[[scenario]]
id = "ticket-start-brainstorming-surfaces-all-unknowns"
user_request = """
The user is working one Jira ticket. During brainstorming, the agent asked one
blocking design question about whether to stack on a dependency branch. The user
answered that the dependency was merged into the feature branch and future work
should stack there. The agent also already knows there are other material
unknowns: the exact posman_credentials Vault-path column, whether Vault secrets
always contain PEM certs or may contain PKCS12, what to emit when a certificate
has no subject CN, and the preferred daily beat timing. No spec/design or
implementation plan has been approved. Describe the correct next user-facing
behavior, including the concrete follow-up questions to ask before spec/design
or plan writing.
"""
forbidden_terms = ["write the implementation plan now", "I will assume vault_path", "proceed with assumptions", "draft the spec now"]

[[scenario.criteria]]
key = "answers_one_question_do_not_end_brainstorming"
description = """
The response says resolving the dependency-branch question does not end brainstorming or authorize spec/design or implementation-plan writing.
"""

[[scenario.criteria]]
key = "surfaces_complete_open_questions"
description = """
The response surfaces the complete known open-questions ledger, including schema column, secret shape, missing-CN behavior, and beat timing, rather than asking only one question or hiding the rest as assumptions.
"""

[[scenario.criteria]]
key = "classifies_blockers_and_assumptions"
description = """
The response groups remaining items into blocking decisions, risky assumptions, and non-blocking assumptions or equivalent categories.
"""

[[scenario.criteria]]
key = "blocks_spec_and_plan_until_resolution"
description = """
The response blocks spec/design writing, implementation-plan writing, execution, and edits until material unknowns are resolved or the user explicitly approves remaining assumptions.
"""

[[scenario.criteria]]
key = "asks_targeted_followups"
description = """
The response asks targeted follow-up questions for each material unknown and asks the user to confirm shared understanding before any spec/design is written.
"""

[[scenario]]
id = "ticket-start-dispatches-code-scope-before-brainstorming"
user_request = """
The user starts one Jira ticket and asks to work only on the coding part. The
agent has read the ticket, parent context, repo instructions, branch state, and
artifact context. It has not dispatched a codebase scoping subagent yet. Several
unknowns may be answerable from the codebase: source table schema, existing
Vault secret conventions, event model mixins, scheduler configuration, related
tests, and prior implementation history. The agent is tempted to do local
scoping and ask the user those questions before dispatching because it thinks
subagents need a separate explicit ask. Describe the correct next behavior.
"""
forbidden_terms = ["local scoping is enough", "ask the user first", "separate explicit ask", "skip scoping dispatch"]

[[scenario.criteria]]
key = "dispatch_before_brainstorming"
description = """
The response says the next step is to dispatch code-mapper before brainstorming, spec/design writing, implementation-plan writing, execution, product edits, or test edits.
"""

[[scenario.criteria]]
key = "local_scoping_not_substitute"
description = """
The response says local scoping by the main agent does not satisfy ticket-start scoping and must not replace the delegated scoping phase.
"""

[[scenario.criteria]]
key = "ticket_request_authorizes_scoping"
description = """
The response says the user's ticket-start request is sufficient authorization to dispatch code-mapper; the agent should not wait for a separate explicit user ask.
"""

[[scenario.criteria]]
key = "scope_sweep_is_comprehensive"
description = """
The response requires an ambitious, comprehensive code scope sweep that tries to answer code-resolvable unknowns before user brainstorming, including schema, secret conventions, event model, scheduler configuration, related tests, prior history, affected files, risks, and verification surfaces.
"""

[[scenario.criteria]]
key = "brainstorm_from_scoping_evidence"
description = """
The response says brainstorming questions should be based on the returned scoping evidence, so the user is only asked about unknowns the codebase sweep could not resolve.
"""

[[scenario]]
id = "ticket-start-brainstorming-after-scoping"
user_request = """
Ticket intake and codebase scoping for one Linear issue are complete. Parent context,
relevant artifact slices, repo state, worktree freshness, and a compact code-mapper
scope report are available. Known ambiguity: whether tax-exempt customers should
bypass the new eligibility rule. Affected surfaces: billing API, checkout
eligibility banner, and analytics event naming. Constraint: do not change legacy
invoice migration behavior. Success criteria: eligible users can check out,
ineligible users see the approved message, and analytics events are stable. The
user and agent have not yet reached shared requirements/design understanding.
Describe the correct next behavior.
"""
forbidden_terms = ["write the implementation plan now", "start coding", "execute now", "dispatch another scoping pass"]

[[scenario.criteria]]
key = "routes_to_user_facing_brainstorming"
description = """
The response routes a user-facing brainstorming session grounded in the ticket, parent context, artifact slices, repo state, scope report, known ambiguity, affected surfaces, constraints, and success criteria.
"""

[[scenario.criteria]]
key = "brainstorming_not_summary_only"
description = """
The response asks for an iterative brainstorming loop with targeted open questions and shared-understanding confirmation, not only a briefing or requirements summary.
"""

[[scenario.criteria]]
key = "blocks_plan_until_spec_approval"
description = """
The response states that plan writing and execution wait until brainstorming produces a written spec/design and the user approves it.
"""

[[scenario.criteria]]
key = "requests_complete_open_questions"
description = """
The response maintains a complete open-questions ledger and blocks spec/design writing until material unknowns are resolved or explicitly approved as assumptions.
"""

[[scenario]]
id = "ticket-start-plan-writing-after-spec-approval"
user_request = """
The brainstorming phase for one Linear issue has produced a user-approved
spec/design. Ticket context, parent context, artifact slices, codebase scope, and
repo constraints are available. No implementation plan has been written or
approved yet. Describe the correct next behavior.
"""
forbidden_terms = ["start coding", "execute now", "edit product code", "skip plan approval"]

[[scenario.criteria]]
key = "routes_plan_writing"
description = """
The response routes implementation-plan writing from the approved spec/design and ticket context instead of writing code or dispatching implementation.
"""

[[scenario.criteria]]
key = "plan_request_is_self_contained"
description = """
The response says the plan-writing request or plan context must include the approved spec/design, ticket facts, parent context, artifact slices, codebase scope, repo constraints, expected checks, and non-goals.
"""

[[scenario.criteria]]
key = "blocks_execution_until_plan_approval"
description = """
The response keeps execution, product edits, test edits, and draft validation out of scope until the implementation plan is written and explicitly approved by the user.
"""

[[scenario]]
id = "ticket-start-execution-phase-uses-native-agents"
user_request = """
The user approved the spec/design and implementation plan for one Linear issue.
The approved execution packet is ready with ticket facts, parent context,
acceptance criteria, approved spec/design, approved plan, scope locators,
branch/worktree state, constraints, expected checks, PR expectations, and report
requirements. Describe what the main agent should do next.
"""
forbidden_terms = ["ticket orchestrator", "ticket-orchestrator", "ticket-execution-coordinator", "handoff main-ticket orchestration", "qa-verification", "ui-verification", "verify-pr", "codebase-scope-map"]

[[scenario.criteria]]
key = "enters_current_session_execution_phase"
description = """
The response enters a current-session execution phase from the approved execution packet, restates the packet fields, uses the shared coordinate-ticket-execution contract, and keeps the main agent as the orchestrator rather than handing off ticket orchestration.
"""

[[scenario.criteria]]
key = "execution_uses_implementation_worker"
description = """
The response coordinates implementation through implementation-worker before review and verification.
"""

[[scenario.criteria]]
key = "execution_uses_native_review_and_verifier_agents"
description = """
The response coordinates independent review through code-reviewer, security review through security-reviewer when there is a plausible security surface, QA through qa-verifier, and UI/UX verification through uiux-verifier when applicable.
"""

[[scenario.criteria]]
key = "security_review_has_explicit_skip_rule"
description = """
The response requires security-reviewer when there is a plausible security surface and records an explicit skip reason only when there is no plausible security surface.
"""

[[scenario.criteria]]
key = "execution_reports_gate_pr_readiness"
description = """
The response says PR verification waits until implementation, independent review, security review or skip, QA, UI/UX or skip, fixes, and affected reruns are resolved, blocked, or explicitly out of scope.
"""

[[scenario]]
id = "ticket-start-implementation-language-keeps-approval-gates"
user_request = """
The user says: "Let's start tackling this Jira ticket. We are only concerned with
the coding part in this repo, use the feature branch for the future PR, and there
is already a draft worktree with changes. Inspect it and keep moving." The agent
has ticket facts, parent context, likely affected files, and a draft branch diff.
It has not completed codebase scoping delegation, user-facing brainstorming, a
written spec/design approval, or implementation-plan approval. Describe the
correct immediate behavior.
"""
forbidden_terms = ["I will run the draft tests", "I will repair the draft branch", "I will continue implementation"]

[[scenario.criteria]]
key = "implementation_language_is_not_approval"
description = """
The response treats start-tackling language, coding-scope language, feature-branch direction, existing draft worktree, likely affected files, and draft diff knowledge as workflow-start context, not approval to validate or continue implementation.
"""

[[scenario.criteria]]
key = "scoping_delegation_is_mandatory_after_intake"
description = """
The response requires delegated codebase scoping through code-mapper after ticket, parent, artifact, and repo intake before brainstorming or implementation planning, with no trivial-scope skip or local replacement.
"""

[[scenario.criteria]]
key = "blocks_preapproval_draft_validation"
description = """
The response blocks validating draft changes, running implementation tests, recommending code repairs, editing product code, editing tests, or treating an existing draft worktree as approved work before spec and plan approval.
"""

[[scenario.criteria]]
key = "mandatory_brainstorm_to_spec_to_plan_order"
description = """
The response preserves the required order: delegated scoping, iterative brainstorming to shared understanding, written spec/design, explicit user spec approval, implementation-plan writing, explicit user plan approval, then execution.
"""

[[scenario.criteria]]
key = "approval_requests_are_explicit"
description = """
The response requires explicit user approval for both the written spec/design and the implementation plan; investigation progress, branch choice, internal checklist, or working notes cannot satisfy either approval gate.
"""

[[scenario]]
id = "ticket-start-pr-readiness-after-existing-pr"
user_request = """
Personal workflow: Linear ticket APP-123 is In Review, PR #12 exists as a draft
on branch feature/app-123, implementation and verification reports are clean,
the intended action is final PR verification before merge approval, merge has
not been explicitly approved yet, and PR metadata/checks/reviews/comments have
not been re-read. Describe the correct next behavior.
"""
forbidden_terms = ["merge now", "mark ready inline", "update the ticket inline", "dismiss comments inline", "final report now"]

[[scenario.criteria]]
key = "delegates_pr_readiness_without_mutation"
description = """
The response delegates or routes a self-contained PR readiness verification request instead of evaluating readiness, merging, updating tickets, dismissing comments, or mutating source-control state inline.
"""

[[scenario.criteria]]
key = "readiness_request_carries_current_state"
description = """
The response carries forward the PR number, branch, current tracker state, clean report state, stale metadata/checks/reviews/comments, intended action, and lack of merge approval.
"""

[[scenario.criteria]]
key = "merge_requires_fresh_readiness_and_approval"
description = """
The response states that merge cannot happen until readiness metadata is freshly checked and explicit merge approval exists.
"""

[[scenario]]
id = "ticket-start-final-requires-reviewable-pr"
user_request = """
One Jira ticket has completed implementation, independent review, QA verification,
UI/UX verification was skipped with a valid backend-only reason, scoped fixes
were applied, and the affected verification reruns are clean. The branch exists
with commits, but no PR has been opened yet. The agent is preparing the final
ticket report for the user. Describe the correct closing behavior.
"""
forbidden_terms = ["done without PR", "final report only", "skip PR creation", "no PR needed"]

[[scenario.criteria]]
key = "ticket_not_complete_without_pr_or_blocker"
description = """
The response says ticket-start should not present the ticket as complete/final for user review unless a reviewable PR exists or a concrete PR-creation blocker is reported.
"""

[[scenario.criteria]]
key = "creates_reviewable_pr_before_final_report"
description = """
The response coordinates PR preparation/opening from the completed branch before the final ticket report, carrying the ticket context, execution summary, verification evidence, and reviewer-facing description needs.
"""

[[scenario.criteria]]
key = "runs_pr_readiness_after_pr_exists"
description = """
After the PR is opened or identified, the response routes PR readiness verification before final handoff so PR creation alone is not treated as completion.
"""

[[scenario.criteria]]
key = "final_report_includes_pr_state"
description = """
The final report includes the PR link or blocker, PR readiness result, ticket state, checks or remote status, and recommended next step for the user.
"""
