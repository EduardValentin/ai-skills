[suite]
name = "linear-issue-writing"
skill = "linear-issue-writing"
skill_path = "skills/linear-issue-writing/SKILL.md"
scenario_env = "LINEAR_ISSUE_WRITING_SCENARIO"
judge_context = """
Loaded skill under test: linear-issue-writing. Judge Linear modeling, approval gates, duplicate detection, and integration fallback behavior.
"""
[[scenario]]
id = "approved-drafts-publishing-gates"
user_request = """
Publish these approved platform-neutral stories to Linear.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "confirms_linear_publishing_context"
description = """
The response confirms this is Linear publishing, asks for target project/team and required metadata, and preserves the approved draft scope.
"""

[[scenario.criteria]]
key = "requires_exact_field_approval"
description = """
The response creates or updates nothing until the user approves exact title, description, parent, project, team, labels, priority, estimate, and other metadata.
"""

[[scenario.criteria]]
key = "runs_duplicate_detection_per_issue"
description = """
Because this pressure prompt does not provide issue payloads or live Linear access, the response requires duplicate detection for each issue before creation and asks whether to skip, update, or create anyway when overlap is found.
"""

[[scenario]]
id = "no-approved-draft-blocks-publishing"
user_request = """
Create Linear tickets for the new onboarding flow.
"""
forbidden_terms = []

[[scenario.criteria]]
key = "does_not_invent_product_scope"
description = """
The response refuses to invent backlog scope inside the Linear publishing skill when approved drafts are missing.
"""

[[scenario.criteria]]
key = "routes_to_drafting_first"
description = """
The response suggests drafting or refinement first and asks for approved source material before publishing.
"""

[[scenario]]
id = "linear-unavailable-formats-only"
user_request = """
Linear is not connected, but publish these approved stories.
"""
forbidden_terms = ["created LIN-", "published successfully"]

[[scenario.criteria]]
key = "blocks_creation_without_integration"
description = """
The response states Linear creation or update cannot proceed while the Linear integration is unavailable.
"""

[[scenario.criteria]]
key = "can_format_draft"
description = """
The response may produce a Linear-ready draft format but does not claim any issue was created.
"""
