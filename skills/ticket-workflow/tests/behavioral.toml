[suite]
name = "ticket-workflow"
skill = "ticket-workflow"
skill_path = "skills/ticket-workflow/SKILL.md"
scenario_env = "TICKET_WORKFLOW_BEHAVIOR_SCENARIO"
judge_context = """
Loaded skill under test: ticket-workflow. Judge the workflow gates and boundary, not exact wording.
"""

[[scenario]]
id = "start-working-does-not-skip-spec-or-plan"
user_request = """
The user says: "Let's start working on this ticket. I'm good with the first
three decisions and your recommendations. The assumptions sound good as well.
I think we are good to go." The agent has discussed decisions and assumptions,
but the user has not yet seen a written spec/design or implementation plan.
"""

[[scenario.criteria]]
key = "blocks_implementation"
description = """
The response treats the user's wording as approval of discussed decisions only, not as approval of an unwritten spec/design or implementation plan.
"""

[[scenario.criteria]]
key = "requires_written_artifacts"
description = """
The response requires writing the spec/design for approval first, then writing the implementation plan for separate approval before code or test edits.
"""

[[scenario]]
id = "reads-parent-and-brainstorms-before-plan"
user_request = """
Start one child ticket under an onboarding Epic. The child ticket describes a
new eligibility rule, but the parent Epic explains the stakeholder goal and
several rollout constraints. Unknowns remain around copy, edge cases, and
failure behavior. Start the interview and say how the loop continues before
spec/design.
"""

[[scenario.criteria]]
key = "reads_ticket_and_parent"
description = """
The response treats both the child ticket and parent context as required before planning, and uses them to understand the goal, stakeholder implications, acceptance criteria, dependencies, and ambiguity.
"""

[[scenario.criteria]]
key = "runs_relentless_brainstorming"
description = """
The response starts a user-facing brainstorming interview and explicitly says it will continue after answers until impactful unknowns and low-confidence points are resolved or explicitly accepted.
"""

[[scenario.criteria]]
key = "plan_waits_for_spec_approval"
description = """
The response does not write the implementation plan until the user approves the written spec/design.
"""

[[scenario]]
id = "adapts-code-scoping-delegation-before-brainstorm"
user_request = """
Start one standalone ticket whose core path is a settings form and save API, but
the ticket may interact with billing entitlements and a migration that were
changed by other recent tickets. The repository is large. The main agent can
inspect the likely settings route/controller directly, while cross-ticket billing
and migration history would require broader discovery. State the next workflow
move before brainstorming.
"""

[[scenario.criteria]]
key = "maps_surface_before_brainstorm"
description = """
The response keeps codebase surface mapping as a setup requirement before brainstorming, including affected files or surfaces, entry points, tests, risks, and verification surfaces with locators.
"""

[[scenario.criteria]]
key = "delegates_selectively"
description = """
The response treats delegation as an adaptive choice, not a mandatory whole-scope handoff: it keeps the main agent responsible for the ticket, workflow interpretation, core settings path, and user-facing decisions while considering read-only delegation for broad independent discovery such as the cross-ticket billing and migration areas.
"""

[[scenario.criteria]]
key = "requires_concise_subagent_output"
description = """
When it delegates broad discovery, the response requires concise, locator-backed, categorized subagent output rather than raw dumps.
"""

[[scenario.criteria]]
key = "explains_inline_choice"
description = """
If the response chooses not to delegate a plausible broad discovery task, it briefly states why that inline choice preserves quality or saves coordination overhead.
"""

[[scenario]]
id = "states-execution-approach-after-plan-approval"
user_request = """
The written spec/design and implementation plan for one ticket are approved.
The approved plan includes a migration slice, an API slice, and a UI slice with
some shared contracts and review risk. The user asks the agent to proceed.
"""

[[scenario.criteria]]
key = "recommends_execution_mode"
description = """
The response recommends an execution mode before editing, choosing inline, subagent-driven delegated execution, or hybrid based on the approved plan's size, coupling, risk, separability, and implementation context, then asks the user to select or approve the execution mode before invoking `/implementation-workflow` for the approved ticket.
"""

[[scenario.criteria]]
key = "transitions_approved_ticket_to_in_progress"
description = """
The response states that, before code or test edits, it would move the associated ticket into the status that correctly marks it as in progress.
"""

[[scenario.criteria]]
key = "does_not_define_implementation_mechanics"
description = """
The response treats ticket-workflow as an implementation transition. It may describe the `/implementation-workflow` dispatch or handoff shape, but it does not perform code edits, claim implementation/review/QA completion, or take over the detailed implementation workflow itself.
"""

[[scenario]]
id = "post-implementation-pr-readiness"
user_request = """
`/implementation-workflow` has finished for the approved ticket and returned
its implementation report. The user asks ticket-workflow to finish the ticket
and provide the final PR-readiness report.
"""

[[scenario.criteria]]
key = "checks_pr_exists"
description = """
The response checks that a PR exists for the implemented ticket, or reports a blocker if no PR exists, before writing the final PR-readiness report.
"""

[[scenario.criteria]]
key = "verifies_pr_ci_pipeline"
description = """
The response checks the PR CI pipeline runs and verifies that all checks are green, or waits for pending checks to finish before declaring the ticket ready.
"""

[[scenario.criteria]]
key = "fixes_failed_pr_ci_before_final_report"
description = """
The response says that if any PR CI check fails, it will investigate and deliver the appropriate fix, rerun or wait for the pipeline, and only then write the final PR-readiness report.
"""

[[scenario.criteria]]
key = "checks_unaddressed_pr_comments"
description = """
The response checks whether any PR comments or review threads remain unaddressed or unresolved, and treats them as blockers to address before the final PR-readiness report.
"""
