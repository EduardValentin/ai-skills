[suite]
name = "codebase-scope-map"
skill = "codebase-scope-map"
skill_path = "skills/codebase-scope-map/SKILL.md"
scenario_env = "CODEBASE_SCOPE_MAP_SCENARIO"
judge_context = """
Loaded skill under test: codebase-scope-map. Judge scope-map behavior, read-only boundaries, locator discipline, and compactness. These scenarios ask for behavior and report content only; do not require actual repository file paths when the prompt says not to inspect a real repo.
"""
[[scenario]]
id = "ticket-scoping-read-only-locators"
user_request = """
Before we implement this ticket, map the relevant code surface so the caller and implementers know exactly which files, tests, patterns, and risks matter without loading the whole repo into context.
"""

[[scenario.criteria]]
key = "structured_locator_map"
description = """
Because this pressure prompt forbids real repo inspection, the response should state that an actual scope map must use compact file:line locators and include entry points, target modules, tests, contracts, dependencies, affected surfaces, and conflict points.
"""

[[scenario.criteria]]
key = "read_only_boundary"
description = """
The response keeps the scoping task read-only and forbids edits, generated writes, formatting rewrites, staging, commits, cleanup, solution selection, or implementation.
"""

[[scenario.criteria]]
key = "downstream_index_not_transcript"
description = """
Because this pressure prompt forbids real repo inspection, the response should describe the deliverable as a navigable downstream index, not a broad source dump, transcript, or vague prose-only summary.
"""

[[scenario]]
id = "token-pressure-compact-map"
user_request = """
The codebase is huge and context is tight. Scope this bug fix for downstream readers, but keep the result compact enough that the caller can carry it.
"""

[[scenario.criteria]]
key = "compact_grouped_entries"
description = """
Because this pressure prompt forbids real repo inspection, the response should require one-line representative entries and grouping for large sections rather than listing every search hit.
"""

[[scenario.criteria]]
key = "risks_not_omitted"
description = """
Because this pressure prompt forbids real repo inspection, the response should say high-risk omitted or uncertain areas belong under conflict points or clarification needs instead of being silently dropped.
"""

[[scenario]]
id = "ui-scope-affected-surfaces"
user_request = """
Scope this UI ticket so later implementation and verification know which
production routes, components, state paths, tests, and contracts are affected.
"""

[[scenario.criteria]]
key = "ui_entry_points_required"
description = """
Because this pressure prompt forbids real repo inspection, the response identifies production UI routes or entry points and changed or likely affected components as required locator categories, marking current locators unknown instead of inventing them.
"""

[[scenario.criteria]]
key = "affected_surface_map_for_verification"
description = """
Because this pressure prompt forbids real repo inspection, the response describes an affected surface map with route, component, state, test, and contract categories, and states why those surfaces matter for implementation or verification once current locators are available.
"""

[[scenario.criteria]]
key = "surfaces_gap"
description = """
If UI surface enumeration cannot be completed, the response reports a conflict or input gap instead of silently dropping the surface.
"""

[[scenario]]
id = "vague-context-maps-and-asks"
user_request = """
Map the scope for this ticket, but the acceptance criteria are vague and I am not sure which route owns the feature.
"""

[[scenario.criteria]]
key = "maps_available_evidence"
description = """
Because this pressure prompt provides no repository to inspect, the response should map what can be known from the prompt and clearly mark incomplete areas.
"""

[[scenario.criteria]]
key = "marks_clarification_needs"
description = """
The response clearly marks missing acceptance criteria, route ownership, and why each input matters as clarification or input needs.
"""

[[scenario.criteria]]
key = "does_not_invent_ownership"
description = """
The response does not invent feature ownership or choose an implementation direction to compensate for missing requirements.
"""
