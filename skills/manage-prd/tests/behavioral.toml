[suite]
name = "manage-prd"
skill = "manage-prd"
skill_path = "skills/manage-prd/SKILL.md"
scenario_env = "MANAGE_PRD_SCENARIO"
judge_context = """
Loaded skill under test: manage-prd. Judge PRD writing quality, edit gates, business focus, coherence, redundancy, and technical-detail boundaries.
"""

[[scenario]]
id = "business-rule-patch-needs-approval"
user_request = "Clarification: archived plans stay visible to coaches forever but clients cannot see them. Update the PRD wording."

[[scenario.criteria]]
key = "identifies_prd_rule"
description = "The response treats the clarification as a product permission/lifecycle rule that belongs in the PRD."

[[scenario.criteria]]
key = "proposes_concise_patch"
description = "The response proposes concise PRD wording or a patch target without adding implementation details."

[[scenario.criteria]]
key = "asks_before_editing"
description = "Because the pressure prompt forbids file mutation, the response asks for approval or states it will not edit until approved."

[[scenario]]
id = "remove-technical-leakage-and-redundancy"
user_request = """
Review this PRD section. It repeats the archive visibility rule in three places,
mentions a React component, a database column, and an API endpoint, and mixes
coach/client business behavior with implementation details. Clean up the PRD
wording.
"""

[[scenario.criteria]]
key = "removes_technical_details"
description = "The response removes or flags implementation details such as components, database columns, API endpoints, file paths, styling, or tracker metadata as inappropriate for PRD content."

[[scenario.criteria]]
key = "consolidates_redundancy"
description = "The response consolidates repeated archive visibility rules into concise PRD wording instead of duplicating them across sections."

[[scenario.criteria]]
key = "keeps_business_context"
description = "The response keeps the PRD focused on coherent coach/client product behavior, permissions, lifecycle, constraints, or business outcomes."

[[scenario]]
id = "ticket-request-stays-out-of-scope"
user_request = "Review this PRD section and then create the implementation tickets for it."

[[scenario.criteria]]
key = "handles_prd_only"
description = "The response handles PRD review or PRD readiness without drafting final backlog tickets."

[[scenario.criteria]]
key = "does_not_create_non_prd_output"
description = "The response does not create non-PRD output and keeps the next step focused on PRD review or missing PRD input."
