[suite]
name = "implementation-workflow"
skill = "implementation-workflow"
skill_path = "skills/implementation-workflow/SKILL.md"
scenario_env = "IMPLEMENTATION_WORKFLOW_SCENARIO"
judge_context = """
Loaded skill under test: implementation-workflow. Judge approved-code implementation behavior, review loop, manual verification, and report boundaries.
"""

[[scenario]]
id = "blocks-without-approved-plan"
user_request = """
The request says to add whatever script seems useful. It provides no approved
spec/design, no approved implementation plan, no acceptance criteria, and no
explicit boundary.
"""

[[scenario.criteria]]
key = "blocks_missing_inputs"
description = """
The response blocks implementation and names the missing approved spec/design, implementation plan, acceptance criteria or outcome, boundary, and relevant context.
"""

[[scenario.criteria]]
key = "does_not_infer_scope"
description = """
The response does not infer missing boundaries or proceed with best-guess implementation.
"""

[[scenario]]
id = "implements-with-tdd-and-engineering-invariants"
user_request = """
Approved implementation packet: add billing retry behavior across the billing
service, notification job, and admin retry UI. The packet includes acceptance
criteria, approved spec/design, approved implementation plan, branch state,
dependencies, risks, and non-goals. The repository is large, the affected
surfaces are only described at a high level. Describe how you would proceed.
"""

[[scenario.criteria]]
key = "starts_from_approved_packet"
description = """
The response starts from the approved spec/design and implementation plan, resolves stale or contradictory context before editing, and stays inside the approved boundary.
"""

[[scenario.criteria]]
key = "uses_tdd_preference"
description = """
The response commits to a TDD approach by expressing intended behavior with a failing test first, implementing, then rerunning the test and relevant checks.
"""

[[scenario.criteria]]
key = "chooses_code_scanning_depth"
description = """
The response decides the code-scanning depth needed before editing based on the approved plan, ambiguity, risk, coupling, and current confidence.
"""

[[scenario.criteria]]
key = "maps_scope_adaptively"
description = """
When affected surfaces are only described at a high level, the response maps the relevant codebase surface before editing, keeps the main agent responsible for the approved plan and core code path, and uses read-only delegation only for broad independent discovery when that preserves output quality and saves main-context load.
"""

[[scenario.criteria]]
key = "scope_map_content_required"
description = """
The response requires delegated and inline discovery together to produce affected files or surfaces, entry points, tests, risks, and verification surfaces with locators before editing.
"""

[[scenario]]
id = "owns-approved-ticket-plan-with-subagent-execution"
user_request = """
A standalone ticket has finished requirements intake, spec/design approval, and
implementation-plan approval. The approved user
story plan includes acceptance criteria, codebase scope, branch state, risks,
non-goals, expected checks, and the selected execution mode is subagent-driven
execution for separate API, UI, job, and migration slices. Describe the workflow
ownership and next execution handoff.
"""

[[scenario.criteria]]
key = "owns_post_ticket_implementation"
description = """
The response treats the approved post-ticket-planning code unit as implementation-workflow scope rather than continuing requirements intake or returning to ticket-workflow for implementation mechanics.
"""

[[scenario.criteria]]
key = "honors_selected_execution_mode"
description = """
The response honors the subagent-driven execution mode selected before implementation-workflow starts, rather than re-deciding the execution mode inside implementation-workflow.
"""

[[scenario.criteria]]
key = "preserves_implementation_contract"
description = """
The response keeps review, mandatory manual QA verification through `qa-verifier`, fixes/reruns, and the implementation report as required parts of the workflow.
"""

[[scenario]]
id = "requires-review-and-manual-qa-before-completion"
user_request = """
Implementation is finished for an approved UI and API change that affects user
input, authorization-sensitive data, persistence, and visible behavior.
Automated tests pass. Native specialist subagents are available in this runtime,
but no independent review or runtime verification evidence has been produced
yet. The user asks whether the implementation workflow is complete.
"""

[[scenario.criteria]]
key = "independent_review_required"
description = """
The response blocks completion and states the review dispatch it would perform in this mocked scenario: dispatch `code-reviewer`, pass the approved goal, acceptance criteria, approved plan, repository instructions, and relevant codebase context, and wait for completion before treating implementation as complete.
"""

[[scenario.criteria]]
key = "manual_qa_required"
description = """
The response blocks completion and states the manual QA dispatch it would perform in this mocked scenario: dispatch `qa-verifier`, pass all relevant context and ticket ACs, wait for completion, and not move forward until manual QA verification is performed.
"""

[[scenario.criteria]]
key = "missing_evidence_named"
description = """
The response names the missing independent review evidence and missing runtime/manual QA evidence as the blockers to completion without imposing a fixed report shape.
"""

[[scenario]]
id = "requires-generic-review-and-qa-fallbacks"
user_request = """
Implementation is finished for an approved API change. Automated tests pass.
No native specialist review or QA subagents are available in this runtime, but
generic capable subagents can be spawned. No independent review or manual QA
verification evidence has been produced yet. The user asks whether the
implementation workflow is complete.
"""

[[scenario.criteria]]
key = "generic_review_required"
description = """
The response states the exact generic review dispatch it would perform in this mocked scenario: dispatch a sufficiently capable generic read-only review subagent; pass the approved goal, acceptance criteria, approved plan, repository instructions, and relevant codebase context; and wait for completion before treating implementation as complete.
"""

[[scenario.criteria]]
key = "generic_manual_qa_required"
description = """
The response states the exact generic manual QA dispatch it would perform in this mocked scenario: dispatch a sufficiently capable generic QA subagent for manual QA verification against the ticket ACs; pass all relevant context; wait for completion; and not move forward until manual QA verification is performed.
"""

[[scenario.criteria]]
key = "fallback_missing_evidence_named"
description = """
The response names the missing independent review evidence and missing runtime/manual QA evidence as the blockers to completion without imposing a fixed report shape.
"""
