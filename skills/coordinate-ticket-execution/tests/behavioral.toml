[suite]
name = "coordinate-ticket-execution"
skill = "coordinate-ticket-execution"
skill_path = "skills/coordinate-ticket-execution/SKILL.md"
scenario_env = "COORDINATE_TICKET_EXECUTION_SCENARIO"
prompt_instructions = """
This is a behavioral pressure test. Do not perform external tool calls, run
commands, inspect live systems, mutate files, create branches, create pull
requests, create tracker issues, or complete the real task. Treat scenario facts
as the only available runtime facts. Do not treat these test-harness limits as
runtime blockers unless the scenario itself says the needed access, tooling, or
runtime is unavailable. Answer as the loaded skill would in this mocked
scenario, focusing on the next decision, blocker, or report you would return.
Use the scenario's language. Do not quote the skill text or test criteria.
"""
judge_context = """
Loaded skill under test: coordinate-ticket-execution. Judge execution-phase boundaries, not exact wording.
"""
[[scenario]]
id = "approved-packet-execution-phase"
user_request = """
An approved execution packet is available for one checkout eligibility work unit. It includes acceptance criteria, approved spec/design, approved implementation plan, scope locators, branch state, dependencies, expected checks, UI applicability, and PR/report expectations. Do not do the work.
"""
forbidden_terms = ["ticket-start", "multi-ticket-work", "implement-unit-of-work", "qa-verification", "ui-verification", "verify-pr", "ticket orchestrator"]

[[scenario.criteria]]
key = "validates_packet_first"
description = """
The response validates the approved execution packet and execution boundary before starting work.
"""

[[scenario.criteria]]
key = "coordinates_separate_phases"
description = """
The response coordinates implementation, independent review, QA, UI/UX when applicable, fixes, reruns, and PR preparation as separate phases rather than one combined worker task.
"""

[[scenario.criteria]]
key = "uses_implementation_worker"
description = """
The response delegates implementation to implementation-worker when native subagents are available.
"""

[[scenario.criteria]]
key = "supports_nested_phase_delegation"
description = """
The response uses nested delegated native agents for implementation, independent review, security review when applicable, QA, UI/UX verification when applicable, and scoped fixes when the runtime supports it, or reports the limitation when it does not. PR preparation remains a separate phase but does not require a dedicated native PR-preparer agent.
"""

[[scenario.criteria]]
key = "does_not_brainstorm_or_change_scope"
description = """
The response does not conduct brainstorming, invent requirements, negotiate scope, or change the approved plan during execution.
"""

[[scenario.criteria]]
key = "requires_phase_evidence_for_completion"
description = """
The response requires PR evidence plus implementation, independent review, QA, UI/UX-or-skip, fixes/reruns, checks, risks, and blockers before completion.
"""

[[scenario.criteria]]
key = "reports_parent_input_needed"
description = """
The response names parent/main-orchestrator input as the path for missing or conflicting approval/scope facts.
"""

[[scenario]]
id = "blocks-missing-approved-packet"
user_request = """
A delegated execution request says only: 'work on the checkout thing and make it pass.' It has no approved spec, no implementation plan, no acceptance criteria, and no approval state.
"""
forbidden_terms = ["start anyway", "ticket-start", "multi-ticket-work"]

[[scenario.criteria]]
key = "blocks_without_packet"
description = """
The response blocks execution when the approved execution packet is missing required details.
"""

[[scenario.criteria]]
key = "uses_blocked_parent_input_status"
description = """
The response reports BLOCKED_NEEDS_PARENT_INPUT or an equivalent explicit parent-input block.
"""

[[scenario.criteria]]
key = "names_missing_inputs"
description = """
The response names missing inputs such as acceptance criteria, approved spec/design, approved plan, approval state, or scope locators.
"""

[[scenario.criteria]]
key = "does_not_infer_or_brainstorm"
description = """
The response does not infer scope, brainstorm with the human, negotiate requirements, or proceed on a best guess.
"""
