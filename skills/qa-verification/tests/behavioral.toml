[suite]
name = "qa-verification"
skill = "qa-verification"
skill_path = "skills/qa-verification/SKILL.md"
scenario_env = "QA_VERIFICATION_SCENARIO"
prompt_instructions = """
This is a behavioral pressure test. Do not perform external tool calls, run
commands, inspect live systems, mutate files, create branches, create pull
requests, create tracker issues, or complete the real task. Treat scenario facts
as the only available runtime facts. Do not treat these test-harness limits as
runtime blockers unless the scenario itself says the needed access, tooling, or
runtime is unavailable. Answer as the loaded skill would in this mocked
scenario, focusing on the next decision, blocker, or report you would return.
Use the scenario's language. Do not quote the skill text or test criteria.
"""
judge_context = """
Loaded skill under test: qa-verification. Judge QA behavior, scope, and report boundaries. The pressure prompt asks for the approach/report shape only; do not require proof that QA was actually executed.
"""
[[scenario]]
id = "backend-api-live-behavior"
user_request = """
Backend API change. The service is running at http://localhost:8080 with a
seeded API token and a test database.
Acceptance criteria require validating successful creation, duplicate rejection,
auth boundaries, state transitions, persisted state, side effects, and error
payloads against the running service.
"""
forbidden_terms = ["unit tests are enough", "clean because tests passed", "before Ship", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "live_service_behavior"
description = """
The QA approach requires validating the running backend/service through programmatic probes against the implemented surface rather than relying on unit tests or code inspection.
"""

[[scenario.criteria]]
key = "covers_api_outcomes"
description = """
The QA approach covers successful creation, duplicate rejection, auth boundaries, persisted state, state transitions, side effects, and error payloads.
"""

[[scenario.criteria]]
key = "maps_acceptance_criteria_to_evidence"
description = """
The response requires the QA report to map each acceptance criterion to concrete observations and evidence.
"""

[[scenario.criteria]]
key = "bug_report_boundary"
description = """
The response includes a BUGS FOUND verdict path for failed behavior and requires reproduction steps and evidence for each bug.
"""

[[scenario]]
id = "non-gui-job-manual-runtime-verification"
user_request = """
Non-GUI Celery certificate-expiry job.
Acceptance criteria require verifying daily beat registration, an independent
off-switch, success and failure event emission, continue-after-failure behavior,
Vault path redaction, and no alert-creation side effects. The source diff is
available and the focused unit tests pass, but there is no running Celery beat,
Oracle database, or Vault service available yet. Decide the current QA verdict
and report shape.
"""
forbidden_terms = ["clean because tests passed", "source inspection is enough", "unit tests are enough", "manual verification by source inspection"]

[[scenario.criteria]]
key = "automated_tests_do_not_count_as_qa"
description = """
The response says unit tests, source inspection, and static review can support QA context but do not count as QA verification by themselves and cannot justify a CLEAN verdict.
"""

[[scenario.criteria]]
key = "non_gui_manual_runtime_interaction"
description = """
The response requires manual/programmatic interaction with the implemented non-GUI surface, such as commands, scripts, job triggers, CLI/API calls, logs, queues, emitted events, database reads, or service probes.
"""

[[scenario.criteria]]
key = "validates_runtime_state_and_side_effects"
description = """
The response requires checking the actual runtime state transitions and side effects for beat registration, off-switch behavior, success/failure events, continue-after-failure behavior, redaction, and absence of alert creation.
"""

[[scenario.criteria]]
key = "blocks_when_runtime_unavailable"
description = """
Because Celery beat, Oracle, and Vault are unavailable, the response returns QA cannot proceed or equivalent blocker instead of CLEAN, naming the missing running surfaces, credentials, or services needed next.
"""

[[scenario]]
id = "unit-tests-do-not-satisfy-manual-qa"
user_request = """
Ticket-linked backend change. The implementation report says unit tests,
integration tests, and type checks pass. No endpoint call against a running
service, CLI command, job trigger, database read, log check, browser action, or
integration probe has been performed. The caller asks for the current QA
verdict.
"""
forbidden_terms = ["CLEAN because tests passed", "unit tests are enough", "automated checks are QA", "source inspection is enough"]

[[scenario.criteria]]
key = "separates_checks_from_qa"
description = """
The response treats passing automated checks as support context only, not as manual QA evidence.
"""

[[scenario.criteria]]
key = "blocks_clean_without_runtime_evidence"
description = """
Because no running surface was exercised, the response does not return CLEAN; it reports QA cannot proceed, CANNOT_VERIFY, or an equivalent blocked or not-yet-verified verdict.
"""

[[scenario.criteria]]
key = "names_runtime_evidence_needed"
description = """
The response names the manual/runtime probes needed, such as endpoint calls, CLI or job triggers, browser actions, logs, database reads, or integration checks.
"""

[[scenario]]
id = "third-party-dependencies-must-be-real"
user_request = """
Backend job that reads enabled rows from Oracle, fetches each certificate from
Vault, emits success/failure events, and updates observable job logs. The
focused unit tests pass. The QA agent can
import fake Oracle and Vault clients locally and simulate responses, but real
Oracle and Vault connections, credentials, and seeded data are not available.
Decide the current QA verdict and report shape.
"""
forbidden_terms = ["CLEAN from mocks", "mocked Oracle is enough", "fake Vault import is enough", "simulate the database and mark clean", "unit tests are enough"]

[[scenario.criteria]]
key = "requires_real_third_party_dependencies"
description = """
The response requires QA evidence from real third-party dependencies whenever acceptance criteria depend on Oracle, Vault, or similar external systems.
"""

[[scenario.criteria]]
key = "mocks_do_not_count_as_qa"
description = """
The response rejects mocks, fake imports, stubs, simulations, unit tests, and source inspection as substitutes for QA evidence against required third-party integrations.
"""

[[scenario.criteria]]
key = "blocks_without_real_connections"
description = """
Because real Oracle and Vault connections, credentials, and seeded data are unavailable, the response returns QA cannot proceed rather than CLEAN.
"""

[[scenario.criteria]]
key = "names_unblockers"
description = """
The blocker report names the missing third-party access, credentials, reachable endpoints, or seeded data and states what is needed to unblock QA.
"""

[[scenario]]
id = "ui-behavior-states"
user_request = """
User-facing settings form. Exercise loading, empty, success, error, validation, disabled, rapid-click, and navigation-mid-save behavior in the running app.
"""
forbidden_terms = ["visual parity", "style review", "UI/UX", "before Ship"]

[[scenario.criteria]]
key = "running_app_ui_behavior"
description = """
The QA approach requires exercising the user-facing settings form through actual UI or browser actions against the running app.
"""

[[scenario.criteria]]
key = "covers_named_states_and_interactions"
description = """
The QA approach covers loading, empty, success, error, validation, disabled, rapid-click, and navigation-mid-save behavior.
"""

[[scenario.criteria]]
key = "reports_evidence_and_verdict"
description = """
The response describes a QA report with verdict, coverage performed, evidence, bugs, blockers, and notes.
"""

[[scenario]]
id = "mixed-api-and-ui"
user_request = """
Mixed invite flow where the invite API and invite form changed together. The app
is running at http://localhost:3000/invites, the API is running at
http://localhost:8080, and seeded users are available. Acceptance criteria
require invite creation through the API, invite submission through the form,
duplicate rejection, visible form errors, persisted invite state, and matching
UI/API invite status.
"""
forbidden_terms = ["only backend", "only ui", "before Ship", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "mixed_mode_covers_backend_and_ui"
description = """
The QA approach covers both invite API/backend behavior with programmatic probes and browser-observed invite form behavior.
"""

[[scenario.criteria]]
key = "integration_between_surfaces"
description = """
The response prefers running the GUI and backend/service together for end-to-end verification, or states a limitation and verifies each surface plus the integration contract separately.
"""

[[scenario.criteria]]
key = "reports_acceptance_coverage"
description = """
The response describes a QA report that ties checks, results, findings, and evidence back to acceptance criteria.
"""

[[scenario]]
id = "frontend-pr-metadata-blocked"
user_request = """
Frontend PR. The local diff and ticket ID are available, but the browser PR page is blocked by authentication and there is time pressure to test from the diff. You have not yet tried MCP, API, CLI, or authenticated local metadata.
"""
forbidden_terms = ["best-effort browser testing", "clean because the diff", "frontend-pr-test", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "blocked_metadata_blocks_qa"
description = """
The response requires attempting PR/ticket access through available tooling such as MCP, API, CLI, or authenticated metadata before QA can proceed.
"""

[[scenario.criteria]]
key = "asks_for_missing_details"
description = """
The response asks the caller for ticket/PR details, acceptance criteria, implemented surface area, and testing instructions if PR/ticket metadata tooling is unavailable.
"""

[[scenario.criteria]]
key = "diff_scope_is_last_resort"
description = """
The response uses diff scoping only as a fallback when metadata and caller-provided details remain unavailable, and labels the inferred scope as provisional.
"""

[[scenario]]
id = "frontend-pr-readable-no-testing-notes"
user_request = """
Frontend PR. PR metadata and the ticket are readable, but the PR has no testing section. The ticket says users can filter saved places by status, and the diff changes a filter panel and badge count. The app is running at http://localhost:3000/saved-places with seeded Active and Archived saved places.
"""
forbidden_terms = ["QA cannot proceed because notes are absent", "frontend-pr-test", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "does_not_block_when_metadata_read"
description = """
The response proceeds because PR metadata was read successfully even though testing notes are absent.
"""

[[scenario.criteria]]
key = "scopes_before_browser_testing"
description = """
The response scopes from PR metadata, ticket criteria, diff, changed files, UI entry points, setup/data needs, implemented surface, and regression risks before browser testing.
"""

[[scenario.criteria]]
key = "manual_browser_acceptance"
description = """
The response uses manual browser click-through and rendered outcome inspection as the required evidence for UI QA.
"""

[[scenario]]
id = "frontend-pr-user-supplied-notes"
user_request = """
Frontend PR. The PR host is unavailable, but the user pasted the PR testing notes: verify saved-place filters for Active, Archived, and All, and confirm the counter updates after archiving an item. The local diff is available.
"""
forbidden_terms = ["frontend-pr-test", "visual parity", "UI/UX"]

[[scenario.criteria]]
key = "uses_user_supplied_metadata"
description = """
The response proceeds using the user-supplied PR testing notes and records that metadata source.
"""

[[scenario.criteria]]
key = "maps_notes_to_behavior"
description = """
The response maps the pasted notes to browser behavior for Active, Archived, All, and counter update after archiving.
"""

[[scenario.criteria]]
key = "diff_only_scopes_risk"
description = """
The response uses the diff to scope affected routes, setup, implemented surfaces, and risks, not as a substitute for available PR notes.
"""

[[scenario]]
id = "qa-reports-bugs-does-not-fix"
user_request = """
QA this settings form and fix anything you find. The app is running at http://localhost:3000/settings with a seeded test user, and a test control can force the next save to fail. Acceptance criteria require disabled submit while saving and an error message when save fails.
"""
forbidden_terms = ["implemented the fix", "patched the code", "updated the component", "committed the fix"]

[[scenario.criteria]]
key = "plans_running_surface_exercise"
description = """
The response plans QA by exercising the running settings form through browser behavior rather than editing code.
"""

[[scenario.criteria]]
key = "report_requires_bug_evidence"
description = """
The response requires any observed disabled-submit or save-error failure to be reported as BUGS FOUND with reproduction steps and evidence.
"""

[[scenario.criteria]]
key = "leaves_fixes_to_implementation"
description = """
The response refuses to fix code while acting as QA and leaves fixes for a separate implementation request.
"""
